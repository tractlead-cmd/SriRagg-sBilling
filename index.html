<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supermarket POS Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
background:#f5f5f5;
}

body.dark{
background:#111;
color:white;
}

.app{
display:flex;
gap:10px;
padding:12px;
height:100vh;
}

.panel{
flex:1;
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
overflow:auto;
}

body.dark .panel{
background:#1e1e1e;
}

.center{
flex:1.3;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
font-family:Poppins;
}

body.dark input{
background:#2a2a2a;
color:white;
border:1px solid #444;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.item{
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

body.dark .item{
background:#2a2a2a;
}

.invoiceBox{
background:#f3f3f3;
padding:10px;
border-radius:10px;
margin-top:10px;
overflow:auto;
}

body.dark .invoiceBox{
background:#222;
}

.suggestionItem{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

body.dark .suggestionItem{
border-bottom:1px solid #333;
}

.selected{
background:#007bff;
color:white;
}

h3{
margin-bottom:10px;
}

.summary{
line-height:30px;
font-size:15px;
}

.totalBox{
margin-top:10px;
padding:10px;
background:#eaf4ff;
border-radius:10px;
}

body.dark .totalBox{
background:#263241;
}

</style>

</head>

<body>

<div class="app">

<!-- LEFT PANEL -->

<div class="panel">

<h3>SUMMARY</h3>

<div class="summary">

Qty: <span id="tQty">0</span><br>

MRP: ₹<span id="tMrp">0</span><br>

Bill: ₹<span id="tBill">0</span><br>

Savings: ₹<span id="tSave">0</span><br>

Items: <span id="tItems">0</span>

</div>

<button onclick="toggleDark()">Dark Mode</button>

<button onclick="showCurrentInvoice()">
Current Invoice: <span id="invUI"></span>
</button>

<button onclick="saveBill()">Save Bill</button>

<button onclick="resetBill()">Reset Bill</button>

<button onclick="sendWhatsApp()">WhatsApp</button>

<input type="date" id="dateFilter" onchange="renderInvoices()">

<input type="text" id="invSearch" placeholder="Search Invoice No">

<button onclick="searchInvoice()">Search Invoice</button>

<div id="invoiceResult"></div>

<button onclick="downloadExcel()">Download Excel</button>

</div>

<!-- CENTER PANEL -->

<div class="panel center">

<input type="file" id="file">

<input type="text" id="search" placeholder="Search product by name or code">

<div id="suggestionsBox"></div>

<input type="number" id="qty" placeholder="Enter Qty">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT PANEL -->

<div class="panel">

<h3>CURRENT BILL</h3>

<div id="billItems" class="invoiceBox"></div>

<h3 style="margin-top:15px;">SAVED INVOICES</h3>

<div id="invoiceList" class="invoiceBox"></div>

</div>

</div>

<script>

/* ================= DATA ================= */

let products = [];

let items = JSON.parse(localStorage.getItem("items")) || [];

let bills = JSON.parse(localStorage.getItem("bills")) || [];

let selected = null;

let index = -1;

let invoiceNo = bills.length
? bills[bills.length - 1].invoiceNo + 1
: 1;

let lastBill = null;

/* ================= INIT ================= */

document.getElementById("invUI").innerText = invoiceNo;

if(localStorage.getItem("dark") == 1){
document.body.classList.add("dark");
}

render();
totals();
renderInvoices();

/* ================= SAVE ================= */

function saveAll(){

localStorage.setItem("items", JSON.stringify(items));

localStorage.setItem("bills", JSON.stringify(bills));

}

/* ================= EXCEL LOAD ================= */

file.onchange = e => {

let reader = new FileReader();

reader.onload = ev => {

let data = new Uint8Array(ev.target.result);

let wb = XLSX.read(data,{type:"array"});

let sh = wb.Sheets[wb.SheetNames[0]];

let json = XLSX.utils.sheet_to_json(sh,{header:1});

products = [];

for(let i=1;i<json.length;i++){

let r = json[i];

if(!r) continue;

products.push({

code: r[1] || "",

name: r[4] || "",

cat: r[0] || "",

mrp: +r[7] || 0,

sale: +r[8] || 0,

unit: r[5] || ""

});

}

alert("Excel Loaded Successfully ✔");

};

reader.readAsArrayBuffer(e.target.files[0]);

};

/* ================= SEARCH ================= */

search.oninput = e => {

let v = e.target.value.toLowerCase();

suggestionsBox.innerHTML = "";

index = -1;

if(!v) return;

products
.filter(p =>

(p.name || "").toLowerCase().includes(v) ||

(p.code || "").toLowerCase().includes(v)

)
.slice(0,15)

.forEach(p => {

let d = document.createElement("div");

d.className = "suggestionItem";

d.innerHTML = `
<b>${p.name}</b><br>
₹${p.sale}
`;

d.onclick = () => selectProduct(p);

suggestionsBox.appendChild(d);

});

};

/* ================= KEYBOARD ================= */

search.onkeydown = e => {

let list = document.querySelectorAll(".suggestionItem");

if(list.length === 0) return;

/* DOWN KEY */

if(e.key === "ArrowDown"){

e.preventDefault();

index++;

if(index >= list.length){
index = 0;
}

highlight(list);

}

/* UP KEY */

if(e.key === "ArrowUp"){

e.preventDefault();

index--;

if(index < 0){
index = list.length - 1;
}

highlight(list);

}

/* ENTER KEY */

if(e.key === "Enter"){

e.preventDefault();

if(list[index]){

list[index].click();

}else{

qty.focus();

}

}

};

/* ================= QTY ENTER ================= */

qty.onkeydown = e => {

if(e.key === "Enter"){

e.preventDefault();

addItem();

}

};

/* ================= HIGHLIGHT ================= */

function highlight(list){

list.forEach(i =>
i.classList.remove("selected")
);

if(list[index]){

list[index].classList.add("selected");

list[index].scrollIntoView({
block:"nearest"
});

}

}

/* ================= SELECT PRODUCT ================= */

function selectProduct(p){

selected = p;

search.value = p.name;

suggestionsBox.innerHTML = "";

qty.focus();

}

/* ================= ADD ITEM ================= */

function addItem(){

if(!selected){

alert("Select Product");

return;

}

let q = parseFloat(qty.value);

if(!q || q <= 0){

alert("Invalid Quantity");

return;

}

let ex = items.find(i => i.code === selected.code);

if(ex){

ex.qty += q;

ex.total = ex.qty * ex.sale;

}else{

items.push({

code: selected.code,

name: selected.name,

cat: selected.cat,

qty: q,

mrp: selected.mrp,

sale: selected.sale,

total: q * selected.sale

});

}

selected = null;

search.value = "";

qty.value = "";

suggestionsBox.innerHTML = "";

render();

totals();

saveAll();

}

/* ================= RENDER CURRENT BILL ================= */

function render(){

let list = document.getElementById("billItems");

list.innerHTML = "";

if(items.length === 0){

list.innerHTML = "No Items Added";

return;

}

items.forEach((i,idx) => {

list.innerHTML += `

<div class="item">

<b>${i.name}</b><br><br>

Qty: ${i.qty}<br>

MRP: ₹${i.mrp}<br>

Sale: ₹${i.sale}<br>

Total: ₹${i.total.toFixed(2)}<br><br>

<button onclick="editItem(${idx})">
Edit
</button>

<button onclick="deleteItem(${idx})"
style="background:red;margin-top:6px;">
Delete
</button>

</div>

`;

});

}

/* ================= TOTALS ================= */

function totals(){

let mrp = 0;

let bill = 0;

let qty = 0;

items.forEach(i => {

mrp += i.mrp * i.qty;

bill += i.total;

qty += i.qty;

});

document.getElementById("tQty").innerText = qty;

document.getElementById("tMrp").innerText = mrp.toFixed(2);

document.getElementById("tBill").innerText = bill.toFixed(2);

document.getElementById("tSave").innerText = (mrp - bill).toFixed(2);

document.getElementById("tItems").innerText = items.length;

}

/* ================= DELETE ITEM ================= */

function deleteItem(idx){

if(!confirm("Delete Item?")) return;

items.splice(idx,1);

saveAll();

render();

totals();

}

/* ================= EDIT ITEM ================= */

function editItem(idx){

let q = prompt(
"Enter New Quantity",
items[idx].qty
);

if(q === null) return;

q = parseFloat(q);

if(!q || q <= 0){

alert("Invalid Quantity");

return;

}

items[idx].qty = q;

items[idx].total = q * items[idx].sale;

saveAll();

render();

totals();

}

/* ================= SAVE BILL ================= */

function saveBill(){

if(items.length === 0){

alert("No Items");

return;

}

let mrpTotal = 0;

let grand = 0;

items.forEach(i => {

mrpTotal += i.mrp * i.qty;

grand += i.total;

});

let bill = {

invoiceNo: invoiceNo,

date: new Date()
.toISOString()
.split("T")[0],

time: new Date()
.toLocaleString(),

items: [...items],

mrpTotal: mrpTotal,

grand: grand,

savings: mrpTotal - grand

};

bills.push(bill);

lastBill = bill;

invoiceNo++;

items = [];

saveAll();

document.getElementById("invUI")
.innerText = invoiceNo;

render();

totals();

renderInvoices();

alert("Bill Saved Successfully ✔");

}

/* ================= RENDER INVOICES ================= */

function renderInvoices(){

let box = document.getElementById("invoiceList");

box.innerHTML = "";

let date = document.getElementById("dateFilter").value;

let filtered = date
? bills.filter(b => b.date === date)
: bills;

if(filtered.length === 0){

box.innerHTML = "No Saved Bills";

return;

}

filtered
.slice()
.reverse()

.forEach(b => {

box.innerHTML += `

<div class="item"
onclick="openBill(${b.invoiceNo})">

<b>Invoice #${b.invoiceNo}</b><br><br>

Date: ${b.date}<br>

Total: ₹${b.grand.toFixed(2)}<br>

Items: ${b.items.length}

</div>

`;

});

}

/* ================= OPEN BILL ================= */

function openBill(no){

let b = bills.find(x => x.invoiceNo === no);

if(!b) return;

items = [...b.items];

render();

totals();

}

/* ================= SEARCH INVOICE ================= */

function searchInvoice(){

let no = parseInt(
document.getElementById("invSearch").value
);

let b = bills.find(x => x.invoiceNo === no);

if(!b){

document.getElementById("invoiceResult")
.innerHTML = "Invoice Not Found";

return;

}

document.getElementById("invoiceResult")
.innerHTML = `

<div class="item">

<b>Invoice #${b.invoiceNo}</b><br>

Date: ${b.date}<br>

Total: ₹${b.grand.toFixed(2)}<br>

Savings: ₹${b.savings.toFixed(2)}

</div>

`;

}

/* ================= WHATSAPP ================= */

function sendWhatsApp(){

if(!lastBill){

alert("Save Bill First");

return;

}

let msg = "🧾 SUPERMARKET BILL\n\n";

lastBill.items.forEach((i,idx) => {

msg += `${idx+1}. ${i.name}
Qty: ${i.qty}
₹${i.total.toFixed(2)}

`;

});

msg += `TOTAL: ₹${lastBill.grand.toFixed(2)}

SAVINGS: ₹${lastBill.savings.toFixed(2)}

INVOICE: ${lastBill.invoiceNo}`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(msg)
);

}

/* ================= RESET ================= */

function resetBill(){

if(!confirm("Reset Current Bill?")) return;

items = [];

saveAll();

render();

totals();

}

/* ================= DARK MODE ================= */

function toggleDark(){

document.body.classList.toggle("dark");

localStorage.setItem(
"dark",
document.body.classList.contains("dark")
? 1
: 0
);

}

/* ================= EXCEL EXPORT ================= */

function downloadExcel(){

if(items.length === 0){

alert("No Items");

return;

}

let data = [[
"Name",
"Category",
"Qty",
"MRP",
"Sale",
"Total"
]];

items.forEach(i => {

data.push([
i.name,
i.cat,
i.qty,
i.mrp,
i.sale,
i.total
]);

});

let wb = XLSX.utils.book_new();

let ws = XLSX.utils.aoa_to_sheet(data);

XLSX.utils.book_append_sheet(
wb,
ws,
"Sales"
);

XLSX.writeFile(
wb,
"sales.xlsx"
);

}

/* ================= SHOW CURRENT INVOICE ================= */

function showCurrentInvoice(){

alert("Current Invoice No: " + invoiceNo);

}

</script>

</body>

</html>
