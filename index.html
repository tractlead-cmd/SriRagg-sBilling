<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SriRagg's Billing App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
}

/* MAIN LAYOUT */
.app{
    display:flex;
    gap:12px;
    height:100vh;
    padding:12px;
}

/* PANELS */
.panel{
    flex:1;
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 0 12px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
}

/* CENTER SLIGHTLY BIGGER */
.centerPanel{
    flex:1.2;
}

/* SCROLL RIGHT SIDE */
.rightPanel #itemList{
    flex:1;
    overflow-y:auto;
    margin-top:10px;
}

/* LEFT TOTAL BOX */
.totalBox{
    background:#f7f7f7;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

/* INPUTS */
input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

/* SUGGESTIONS */
#suggestionsBox{
    background:white;
    border:1px solid #ddd;
    max-height:200px;
    overflow-y:auto;
    margin-top:5px;
}

.suggestionItem{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.suggestionItem:hover{
    background:#f0f6ff;
}

/* ITEMS */
.item{
    background:#fafafa;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #eee;
}

h3{
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT PANEL -->
<div class="panel leftPanel">

<h3>Total</h3>

<div class="totalBox">
<div>Total Qty: <span id="totalItems">0</span></div>
<div>MRP Total: ₹<span id="mrpTotal">0</span></div>
<div>Bill Total: ₹<span id="billTotal">0</span></div>
</div>

</div>

<!-- CENTER PANEL -->
<div class="panel centerPanel">

<h3>Billing</h3>

<input type="file" id="productFile" accept=".xlsx,.xls,.csv">

<input type="text" id="itemName" placeholder="Search Product">
<div id="suggestionsBox"></div>

<input type="number" id="itemQty" placeholder="Quantity">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT PANEL -->
<div class="panel rightPanel">

<h3>Items</h3>

<div id="itemList"></div>

</div>

</div>

<script>

/* ===== DATA ===== */
let productCatalog = [];
let items = [];
let selectedProduct = null;

/* ===== ELEMENTS ===== */
const itemName = document.getElementById("itemName");
const itemQty = document.getElementById("itemQty");
const suggestionsBox = document.getElementById("suggestionsBox");
const productFile = document.getElementById("productFile");

/* ===== EXCEL UPLOAD ===== */
productFile.addEventListener("change", function(e){

    let file = e.target.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(event){

        let data = new Uint8Array(event.target.result);

        let workbook = XLSX.read(data, {type:"array"});

        let sheet = workbook.Sheets[workbook.SheetNames[0]];

        let json = XLSX.utils.sheet_to_json(sheet, {header:1});

        parseExcel(json);
    };

    reader.readAsArrayBuffer(file);
});

/* ===== EXCEL PARSER (YOUR FORMAT) ===== */
function parseExcel(data){

    productCatalog = [];

    for(let i=1;i<data.length;i++){

        let row = data[i];
        if(!row || row.length===0) continue;

        productCatalog.push({

            category: (row[0] || "").trim(),
            code: (row[1] || "").trim(),
            brand: (row[2] || "").trim(),
            internalName: (row[3] || "").trim(),
            displayName: (row[4] || "").trim(),
            unit: (row[5] || "").trim(),

            costPrice: Number(row[6]) || 0,
            mrp: Number(row[7]) || 0,
            salePrice: Number(row[8]) || 0,

            stockQty: Number(row[9]) || 0,
            minQty: Number(row[10]) || 0,
            status: (row[11] || "").trim(),
            gst: Number(row[12]) || 0,
            barcode: (row[13] || "").trim()
        });
    }

    alert("Excel Loaded Successfully");
}

/* ===== SEARCH ===== */
itemName.addEventListener("input", function(){

    let search = itemName.value.toLowerCase();
    suggestionsBox.innerHTML = "";

    if(search === "") return;

    let filtered = productCatalog.filter(p => {
        return (
            (p.displayName || "").toLowerCase().includes(search) ||
            (p.code || "").toLowerCase().includes(search)
        );
    });

    filtered.slice(0,20).forEach(product => {

        let div = document.createElement("div");
        div.className = "suggestionItem";

        div.innerHTML = `
            <b>${product.displayName}</b><br>
            ${product.brand} | ${product.unit}<br>
            MRP ₹${product.mrp} | Sale ₹${product.salePrice}
        `;

        div.onclick = () => {
            selectedProduct = product;
            itemName.value = product.displayName;
            suggestionsBox.innerHTML = "";
        };

        suggestionsBox.appendChild(div);
    });
});

/* ===== ADD ITEM ===== */
function addItem(){

    if(!selectedProduct){
        alert("Select Product");
        return;
    }

    let qty = parseFloat(itemQty.value);

    if(!qty || qty <= 0){
        alert("Enter quantity");
        return;
    }

    items.push({
        name: selectedProduct.displayName,
        qty: qty,
        mrp: selectedProduct.mrp,
        sale: selectedProduct.salePrice,
        total: qty * selectedProduct.salePrice
    });

    selectedProduct = null;
    itemName.value = "";
    itemQty.value = "";

    render();
    totals();
}

/* ===== RENDER ITEMS ===== */
function render(){

    let list = document.getElementById("itemList");
    list.innerHTML = "";

    items.forEach((i, index)=>{

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            ${index+1}. ${i.name}<br>
            Qty: ${i.qty} | ₹${i.sale}<br>
            Total: ₹${i.total.toFixed(2)}
        `;

        list.appendChild(div);
    });
}

/* ===== TOTALS ===== */
function totals(){

    let mrpTotal = 0;
    let billTotal = 0;
    let qtyTotal = 0;

    items.forEach(i=>{
        mrpTotal += i.mrp * i.qty;
        billTotal += i.total;
        qtyTotal += i.qty;
    });

    document.getElementById("mrpTotal").innerText = mrpTotal.toFixed(2);
    document.getElementById("billTotal").innerText = billTotal.toFixed(2);
    document.getElementById("totalItems").innerText = qtyTotal;
}

</script>

</body>
</html>
