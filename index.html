<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SriRagg POS System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
}

/* DARK MODE */
body.dark{
    background:#111;
    color:white;
}

/* LAYOUT */
.app{
    display:flex;
    gap:12px;
    height:100vh;
    padding:12px;
}

/* PANELS */
.panel{
    flex:1;
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 0 12px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
}

body.dark .panel{
    background:#1e1e1e;
}

/* CENTER BIGGER */
.centerPanel{flex:1.2;}

/* RIGHT LIST */
.rightPanel #itemList{
    flex:1;
    overflow-y:auto;
    margin-top:10px;
}

/* INPUTS */
input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

body.dark input{
    background:#2a2a2a;
    color:white;
    border:1px solid #444;
}

/* BUTTONS */
button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

/* SUGGESTIONS */
#suggestionsBox{
    max-height:200px;
    overflow-y:auto;
    border:1px solid #ddd;
    margin-top:5px;
}

.suggestionItem{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.selected{
    background:#007bff;
    color:white;
}

/* ITEM */
.item{
    background:#f7f7f7;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

body.dark .item{
    background:#2a2a2a;
}

/* TOTAL BOX */
.totalBox{
    background:#f7f7f7;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

body.dark .totalBox{
    background:#2a2a2a;
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="panel">

<h3>Summary</h3>

<div class="totalBox">
<div>Total Qty: <span id="totalItems">0</span></div>
<div>MRP: ₹<span id="mrpTotal">0</span></div>
<div>Bill: ₹<span id="billTotal">0</span></div>
<div>Savings: ₹<span id="savings">0</span></div>
</div>

<br>

<button onclick="toggleDark()">🌙 Dark Mode</button>
<button onclick="resetBill()">🗑 Reset</button>
<button onclick="sendWhatsApp()">📤 WhatsApp</button>

</div>

<!-- CENTER -->
<div class="panel centerPanel">

<h3>Billing</h3>

<input type="file" id="productFile">

<input type="text" id="itemName" placeholder="Search product">
<div id="suggestionsBox"></div>

<input type="number" id="itemQty" placeholder="Quantity">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT -->
<div class="panel">

<h3>Items</h3>
<div id="itemList"></div>

</div>

</div>

<script>

/* DATA */
let productCatalog = [];
let items = [];
let selectedProduct = null;
let currentIndex = -1;

/* ELEMENTS */
const itemName = document.getElementById("itemName");
const itemQty = document.getElementById("itemQty");
const box = document.getElementById("suggestionsBox");

/* LOAD DARK MODE */
if(localStorage.getItem("dark")==="1"){
    document.body.classList.add("dark");
}

/* EXCEL */
document.getElementById("productFile").addEventListener("change", function(e){

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(ev){

        let data = new Uint8Array(ev.target.result);
        let wb = XLSX.read(data, {type:"array"});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet, {header:1});

        productCatalog = [];

        for(let i=1;i<json.length;i++){

            let r = json[i];
            if(!r) continue;

            productCatalog.push({
                displayName: r[4],
                code: r[1],
                brand: r[2],
                unit: r[5],
                mrp: Number(r[7])||0,
                sale: Number(r[8])||0
            });
        }

        alert("Loaded");
    };

    reader.readAsArrayBuffer(file);
});

/* SEARCH */
itemName.addEventListener("input", function(){

    let val = itemName.value.toLowerCase();
    box.innerHTML="";
    currentIndex = -1;

    if(!val) return;

    let filtered = productCatalog.filter(p =>
        (p.displayName||"").toLowerCase().includes(val) ||
        (p.code||"").toLowerCase().includes(val)
    );

    filtered.slice(0,15).forEach((p,i)=>{

        let div = document.createElement("div");
        div.className="suggestionItem";

        div.innerHTML = p.displayName;

        div.onclick = ()=>selectProduct(p);

        box.appendChild(div);
    });
});

/* KEY NAVIGATION */
itemName.addEventListener("keydown", function(e){

    let items = document.querySelectorAll(".suggestionItem");

    if(e.key==="ArrowDown"){
        e.preventDefault();
        currentIndex++;
        highlight(items);
    }

    if(e.key==="ArrowUp"){
        e.preventDefault();
        currentIndex--;
        highlight(items);
    }

    if(e.key==="Enter"){
        e.preventDefault();

        if(currentIndex>=0 && items[currentIndex]){
            items[currentIndex].click();
        } else {
            itemQty.focus();
        }
    }
});

function highlight(items){
    items.forEach(i=>i.classList.remove("selected"));

    if(items[currentIndex]){
        items[currentIndex].classList.add("selected");
        items[currentIndex].scrollIntoView({block:"nearest"});
    }
}

/* SELECT */
function selectProduct(p){
    selectedProduct = p;
    itemName.value = p.displayName;
    box.innerHTML="";
    itemQty.focus();
}

/* ADD */
itemQty.addEventListener("keydown", function(e){
    if(e.key==="Enter"){
        addItem();
    }
});

function addItem(){

    if(!selectedProduct) return alert("Select product");

    let qty = Number(itemQty.value);
    if(!qty) return alert("Qty needed");

    items.push({
        name:selectedProduct.displayName,
        qty,
        mrp:selectedProduct.mrp,
        sale:selectedProduct.sale,
        total:qty*selectedProduct.sale
    });

    itemName.value="";
    itemQty.value="";
    selectedProduct=null;

    render();
    totals();

    itemName.focus(); // RETURN TO SEARCH
}

/* RENDER */
function render(){

    let list=document.getElementById("itemList");
    list.innerHTML="";

    items.forEach((i,idx)=>{

        let div=document.createElement("div");
        div.className="item";

        div.innerHTML=`
        <b>${i.name}</b><br>
        Qty: ${i.qty}<br>
        ₹${i.total.toFixed(2)}<br>

        <button onclick="edit(${idx})" style="background:#ffc107;color:black;">Edit</button>
        <button onclick="del(${idx})" style="background:red;">Delete</button>
        `;

        list.appendChild(div);
    });
}

/* EDIT */
function edit(i){
    let item = items[i];
    itemName.value = item.name;
    itemQty.value = item.qty;
    selectedProduct = productCatalog.find(p=>p.displayName===item.name);
    items.splice(i,1);
    render(); totals();
    itemName.focus();
}

/* DELETE */
function del(i){
    items.splice(i,1);
    render(); totals();
}

/* TOTALS */
function totals(){

    let mrp=0, bill=0, qty=0;

    items.forEach(i=>{
        mrp += i.mrp*i.qty;
        bill += i.total;
        qty += i.qty;
    });

    document.getElementById("mrpTotal").innerText=mrp.toFixed(2);
    document.getElementById("billTotal").innerText=bill.toFixed(2);
    document.getElementById("totalItems").innerText=qty;
    document.getElementById("savings").innerText=(mrp-bill).toFixed(2);
}

/* RESET */
function resetBill(){
    items=[];
    render(); totals();
}

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
    localStorage.setItem("dark",document.body.classList.contains("dark")?1:0);
}

/* WHATSAPP */
function sendWhatsApp(){

    let msg="Bill Summary:\n";

    items.forEach(i=>{
        msg += `${i.name} x ${i.qty} = ₹${i.total}\n`;
    });

    window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
