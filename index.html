<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Billing App</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
    transition:0.3s;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.headerTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:0;
    padding:0;
}

.headerTop h2{
    margin:0;
    font-size:24px;
}

#dateTime{
    margin:0;
    font-size:13px;
    color:gray;
    white-space:nowrap;
}

.topButtons{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.topButtons button{
    flex:1;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.whatsappBtn{
    background:#25D366;
}

.whatsappBtn:hover{
    background:#1da851;
}

.resetBtn{
    background:#dc3545;
}

.resetBtn:hover{
    background:#b02a37;
}

.darkBtn{
    background:#333;
}

.darkBtn:hover{
    background:#111;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:10px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.itemButtons{
    display:flex;
    flex-direction:column;
    gap:5px;
    margin-top:5px;
}

.editBtn{
    background:#ffc107;
    color:black;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
}

.cancelBtn{
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
}

.totalBox{
    margin-top:12px;
    margin-bottom:15px;
    padding:12px 15px;
    background:#f0f0f0;
    border-radius:10px;
}

.totalBox h3{
    margin:4px 0;
    font-size:16px;
}

.darkMode{
    background:#111;
    color:white;
}

.darkMode .container{
    background:#1e1e1e;
}

.darkMode input{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode .totalBox{
    background:#333;
}

.darkMode #dateTime{
    color:#ccc;
}

</style>

</head>

<body>

<div class="container">

<div class="headerTop">

<h2>Sri Raghavendra Grocery</h2>

<p id="dateTime"></p>

</div>

<div class="totalBox">

<h3>
Total Quantity:
<span id="totalItems">0</span>
</h3>

<h3>
Total Cost:
₹<span id="totalCost">0</span>
</h3>

</div>

<div class="topButtons">

<button class="whatsappBtn"
onclick="sendWhatsApp()">
Send WhatsApp
</button>

<button class="resetBtn"
onclick="resetBill()">
Reset
</button>

<button class="darkBtn"
onclick="toggleDarkMode()">
🌙
</button>

</div>

<input type="text"
id="customerName"
placeholder="Customer Name">

<input type="number"
id="customerPhone"
placeholder="WhatsApp Number">

<input type="text"
id="itemName"
placeholder="Item Name">

<input type="number"
id="itemQty"
placeholder="Quantity">

<input type="number"
id="itemPrice"
placeholder="Price Per Item">

<button onclick="addItem()">
Add Item
</button>

<div id="itemList"></div>

</div>

<script>

let items = [];

let invoiceCounter =
localStorage.getItem("invoiceCounter") || 1;

const itemName =
document.getElementById("itemName");

const itemQty =
document.getElementById("itemQty");

const itemPrice =
document.getElementById("itemPrice");

itemName.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        itemQty.focus();

    }

});

itemQty.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        itemPrice.focus();

    }

});

itemPrice.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        addItem();

    }

});

document.addEventListener("keydown",function(e){

    if(e.altKey && e.key==="Enter"){

        resetBill();

    }

    if(e.ctrlKey && e.key==="Enter"){

        sendWhatsApp();

    }

});

function addItem(){

    let name =
    itemName.value.trim();

    let qty =
    parseFloat(itemQty.value);

    let price =
    parseFloat(itemPrice.value);

    if(name==="" || isNaN(qty) || isNaN(price)){

        alert("Please enter all fields");

        return;

    }

    let total =
    qty * price;

    items.push({

        name:name,
        qty:qty,
        price:price,
        total:total

    });

    displayItems();

    updateTotals();

    saveToLocalStorage();

    itemName.value="";
    itemQty.value="";
    itemPrice.value="";

    itemName.focus();

}

function displayItems(){

    let itemList =
    document.getElementById("itemList");

    itemList.innerHTML = "";

    items.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className = "item";

        div.innerHTML = `

        <div>

        <strong>${item.name}</strong><br>

        Qty: ${item.qty}
        × ₹${item.price}

        </div>

        <div style="text-align:right;">

        ₹${item.total}

        <div class="itemButtons">

        <button
        class="editBtn"
        onclick="editItem(${index})">
        Edit
        </button>

        <button
        class="cancelBtn"
        onclick="removeItem(${index})">
        Cancel
        </button>

        </div>

        </div>

        `;

        itemList.appendChild(div);

    });

}

function editItem(index){

    let item = items[index];

    itemName.value = item.name;

    itemQty.value = item.qty;

    itemPrice.value = item.price;

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveToLocalStorage();

}

function removeItem(index){

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveToLocalStorage();

}

function updateTotals(){

    let totalCost = 0;

    let totalItems = 0;

    items.forEach((item)=>{

        totalCost += item.total;

        totalItems += item.qty;

    });

    document.getElementById("totalCost")
    .innerText = totalCost;

    document.getElementById("totalItems")
    .innerText = totalItems;

}

function saveToLocalStorage(){

    localStorage.setItem(
        "billingItems",
        JSON.stringify(items)
    );

}

function sendWhatsApp(){

    if(items.length===0){

        alert("No items added");

        return;

    }

    let customer =
    document.getElementById("customerName")
    .value;

    let phone =
    document.getElementById("customerPhone")
    .value;

    let totalCost = 0;

    let totalItems = 0;

    let now = new Date();

    let invoiceNumber =
    "SRG-" +
    String(invoiceCounter).padStart(4,"0");

    let billDate =
    now.toLocaleDateString("en-IN",{

        weekday:"long",
        day:"2-digit",
        month:"short",
        year:"numeric"

    });

    let billTime =
    now.toLocaleTimeString("en-IN",{

        hour:"numeric",
        minute:"2-digit"

    });

    let message =
    "Sri Raghavendra Grocery | Bilekahalli\n\n" +

    "Invoice No: " +
    invoiceNumber +
    "\n\n" +

    "Customer: " +
    customer +
    "\n\n" +

    "Date: " +
    billDate +
    "\n" +

    "Time: " +
    billTime +
    "\n\n";

    items.forEach((item)=>{

        message +=
        item.name +
        " | Qty: " +
        item.qty +
        " | ₹" +
        item.total +
        "\n";

        totalCost += item.total;

        totalItems += item.qty;

    });

    message +=
    "\n------------------\n";

    message +=
    "Total Quantity: " +
    totalItems + "\n";

    message +=
    "Total Cost: ₹" +
    totalCost +

    "\n\nThank you for shopping with us" +

    "\nVisit Again";

    let url =
    "https://wa.me/91" +
    phone +
    "?text=" +
    encodeURIComponent(message);

    window.open(url,"_blank");

    invoiceCounter++;

    localStorage.setItem(
        "invoiceCounter",
        invoiceCounter
    );

}

function resetBill(){

    items = [];

    displayItems();

    updateTotals();

    saveToLocalStorage();

    itemName.value="";
    itemQty.value="";
    itemPrice.value="";

    itemName.focus();

}

function toggleDarkMode(){

    document.body.classList.toggle("darkMode");

}

function updateDateTime(){

    let now =
    new Date();

    let options = {

        weekday:"short",
        day:"2-digit",
        month:"short",
        hour:"numeric",
        minute:"2-digit"

    };

    document.getElementById("dateTime")
    .innerText =
    now.toLocaleString("en-IN",options);

}

setInterval(updateDateTime,1000);

window.onload = function(){

    let savedItems =
    localStorage.getItem("billingItems");

    if(savedItems){

        items =
        JSON.parse(savedItems);

        displayItems();

        updateTotals();

    }

    updateDateTime();

}

</script>

</body>

</html>
