<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supermarket POS Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#f5f5f5;
}

body.dark{
background:#111;
color:white;
}

.app{
display:flex;
gap:10px;
padding:12px;
height:100vh;
}

.panel{
flex:1;
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

body.dark .panel{
background:#1e1e1e;
}

.center{flex:1.3;}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

body.dark input{
background:#2a2a2a;
color:white;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.item{
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

body.dark .item{background:#2a2a2a;}

.invoiceBox{
background:#f3f3f3;
padding:10px;
border-radius:10px;
margin-top:10px;
max-height:350px;
overflow:auto;
}

body.dark .invoiceBox{background:#222;}

.suggestionItem{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.selected{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="panel">

<h3>SUMMARY</h3>

<div>
Qty: <span id="tQty">0</span><br>
MRP: ₹<span id="tMrp">0</span><br>
Bill: ₹<span id="tBill">0</span><br>
Savings: ₹<span id="tSave">0</span>
</div>

<button onclick="toggleDark()">Dark Mode</button>

<button onclick="showInvoice()">Current Invoice: <span id="invUI"></span></button>

<button onclick="saveBill()">Save Bill</button>
<button onclick="resetBill()">Reset</button>
<button onclick="sendWhatsApp()">WhatsApp</button>

<input type="date" id="dateFilter" onchange="renderInvoices()">

<input type="text" id="invSearch" placeholder="Search Invoice No">
<button onclick="searchInvoice()">Search Invoice</button>

<div id="invoiceResult"></div>

<button onclick="downloadExcel()">Download Excel</button>

</div>

<!-- CENTER -->
<div class="panel center">

<input type="file" id="file">

<input type="text" id="search" placeholder="Search product">
<div id="suggestionsBox"></div>

<input type="text" id="qty" placeholder="Qty (100g / 1kg / 2ltr)">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT -->
<div class="panel">

<h3>INVOICE LIST</h3>

<div id="invoiceList" class="invoiceBox"></div>

</div>

</div>

<script>

/* ================= DATA ================= */

let products = [];

let items = JSON.parse(localStorage.getItem("items")) || [];
let bills = JSON.parse(localStorage.getItem("bills")) || [];

let selected = null;
let index = -1;

let invoiceNo = bills.length ? bills[bills.length-1].invoiceNo + 1 : 1;

let lastBill = null;

/* ================= INIT UI ================= */

document.getElementById("invUI").innerText = invoiceNo;

/* ================= SAVE ================= */

function saveAll(){
localStorage.setItem("items", JSON.stringify(items));
localStorage.setItem("bills", JSON.stringify(bills));
}

/* ================= EXCEL LOAD ================= */

file.onchange = e => {

let reader = new FileReader();

reader.onload = ev => {

let data = new Uint8Array(ev.target.result);
let wb = XLSX.read(data,{type:"array"});
let sh = wb.Sheets[wb.SheetNames[0]];
let json = XLSX.utils.sheet_to_json(sh,{header:1});

products = [];

for(let i=1;i<json.length;i++){
let r=json[i];
if(!r) continue;

products.push({
code:r[1],
name:r[4],
cat:r[0],
mrp:+r[7]||0,
sale:+r[8]||0,
unit:r[5]
});
}

alert("Excel Loaded");
};

reader.readAsArrayBuffer(e.target.files[0]);
};

/* ================= SEARCH ================= */

search.oninput = e => {

let v = e.target.value.toLowerCase();
suggestionsBox.innerHTML = "";
index = -1;

if(!v) return;

products.filter(p =>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").toLowerCase().includes(v)
).slice(0,15).forEach(p=>{

let d = document.createElement("div");
d.className = "suggestionItem";
d.innerText = p.name;
d.onclick = ()=>select(p);

suggestionsBox.appendChild(d);
});
};

/* ================= KEYBOARD FIX ================= */

search.onkeydown = e => {

let list = document.querySelectorAll(".suggestionItem");

if(list.length === 0) return;

if(e.key==="ArrowDown"){
e.preventDefault();
index++;
if(index >= list.length) index = 0;
highlight(list);
}

if(e.key==="ArrowUp"){
e.preventDefault();
index--;
if(index < 0) index = list.length-1;
highlight(list);
}

if(e.key==="Enter"){
e.preventDefault();

if(list[index]) list[index].click();
else qty.focus();
}
};

function highlight(list){
list.forEach(i=>i.classList.remove("selected"));
if(list[index]){
list[index].classList.add("selected");
list[index].scrollIntoView({block:"nearest"});
}
}

/* ================= SELECT ================= */

function select(p){
selected = p;
search.value = p.name;
suggestionsBox.innerHTML = "";
qty.focus();
}

/* ================= ADD ITEM ================= */

function addItem(){

if(!selected) return alert("Select product");

let q = parseFloat(qty.value);
if(!q) return alert("Invalid qty");

let ex = items.find(i=>i.code===selected.code);

if(ex){
ex.qty += q;
ex.total = ex.qty * selected.sale;
}else{
items.push({
code:selected.code,
name:selected.name,
cat:selected.cat,
qty:q,
mrp:selected.mrp,
sale:selected.sale,
total:q*selected.sale
});
}

selected=null;
search.value="";
qty.value="";
suggestionsBox.innerHTML="";

render();
totals();
saveAll();
}

/* ================= RENDER ================= */

function render(){

list.innerHTML="";

items.forEach((i,idx)=>{
list.innerHTML += `
<div class="item">
<b>${i.name}</b><br>
Qty:${i.qty}<br>
₹${i.total.toFixed(2)}<br>

<button onclick="edit(${idx})">Edit</button>
<button onclick="del(${idx})" style="background:red;">Delete</button>
</div>`;
});
}

/* ================= TOTALS ================= */

function totals(){

let m=0,b=0,q=0;

items.forEach(i=>{
m += i.mrp*i.qty;
b += i.total;
q += i.qty;
});

tQty.innerText=q;
tMrp.innerText=m.toFixed(2);
tBill.innerText=b.toFixed(2);
tSave.innerText=(m-b).toFixed(2);
}

/* ================= SAVE BILL ================= */

function saveBill(){

if(items.length===0){
alert("No items");
return;
}

let mrpTotal=0;
let grand=0;

items.forEach(i=>{
mrpTotal += i.mrp*i.qty;
grand += i.total;
});

let bill = {
invoiceNo,
date:new Date().toISOString().split("T")[0],
time:new Date().toLocaleString(),
items:[...items],
mrpTotal,
grand,
savings:mrpTotal-grand
};

bills.push(bill);
lastBill = bill;

invoiceNo++;

items=[];
saveAll();

document.getElementById("invUI").innerText = invoiceNo;

render();
totals();
renderInvoices();

alert("Bill Saved ✔");
}

/* ================= INVOICE LIST ================= */

function renderInvoices(){

let box = document.getElementById("invoiceList");
box.innerHTML = "";

let date = dateFilter.value;

let filtered = date ? bills.filter(b=>b.date===date) : bills;

filtered.forEach(b=>{
box.innerHTML += `
<div class="item" onclick="openBill(${b.invoiceNo})">
<b>#${b.invoiceNo}</b><br>
${b.date}<br>
₹${b.grand}
</div>`;
});
}

function openBill(no){
let b = bills.find(x=>x.invoiceNo===no);
if(!b) return;

items = b.items;
render();
totals();
}

/* ================= SEARCH INVOICE ================= */

function searchInvoice(){

let no = parseInt(invSearch.value);

let b = bills.find(x=>x.invoiceNo===no);

if(!b){
invoiceResult.innerHTML="Not Found";
return;
}

invoiceResult.innerHTML = `
<b>Invoice #${b.invoiceNo}</b><br>
Date:${b.date}<br>
Total:₹${b.grand}
`;
}

/* ================= WHATSAPP ================= */

function sendWhatsApp(){

if(!lastBill){
alert("No saved bill");
return;
}

let msg="🧾 BILL\n\n";

lastBill.items.forEach((i,idx)=>{
msg += `${idx+1}. ${i.name}
Qty:${i.qty}
₹${i.total}\n`;
});

msg += `
TOTAL: ₹${lastBill.grand}
INVOICE: ${lastBill.invoiceNo}
`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

/* ================= RESET ================= */

function resetBill(){
items=[];
saveAll();
render();
totals();
}

/* ================= DARK ================= */

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",
document.body.classList.contains("dark")?1:0);
}

/* ================= EXCEL ================= */

function downloadExcel(){

let data=[["Name","Category","Qty","Total"]];

items.forEach(i=>{
data.push([i.name,i.cat,i.qty,i.total]);
});

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.aoa_to_sheet(data);

XLSX.utils.book_append_sheet(wb,ws,"Report");
XLSX.writeFile(wb,"sales.xlsx");
}

</script>

</body>
</html>
