<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SriRagg's Billing App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    padding:15px;
}

.container{
    max-width:430px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:18px;
    box-shadow:0 0 12px rgba(0,0,0,0.08);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.logo{
    font-size:24px;
    font-weight:600;
}

#dateTime{
    font-size:12px;
    color:gray;
    margin-top:3px;
}

.topButtons{
    display:flex;
    gap:8px;
}

.iconBtn{
    border:none;
    color:white;
    width:42px;
    height:42px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

.whatsappBtn{
    background:#25D366;
}

.darkBtn{
    background:#222;
}

.resetBtn{
    background:#dc3545;
}

input,
select,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
    font-family:'Poppins',sans-serif;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

#suggestionsBox{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    max-height:220px;
    overflow-y:auto;
    margin-top:5px;
}

.suggestionItem{
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.suggestionItem:hover{
    background:#f0f0f0;
}

.totalBox{
    margin-top:15px;
    padding:15px;
    border-radius:14px;
    background:#f4f4f4;
}

.totalLine{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:15px;
}

.dotted{
    border-bottom:2px dashed #000;
    margin-top:12px;
    margin-bottom:12px;
}

.grandTotal{
    font-size:28px;
    font-weight:700;
    text-align:right;
}

.savings{
    text-align:right;
    color:green;
    font-weight:600;
    margin-top:8px;
}

#itemList{
    margin-top:18px;
    max-height:320px;
    overflow-y:auto;
    padding-right:4px;
    scrollbar-width:thin;
}

#itemList::-webkit-scrollbar{
    width:6px;
}

#itemList::-webkit-scrollbar-thumb{
    background:#bbb;
    border-radius:10px;
}

.item{
    background:#fafafa;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    border:1px solid #eee;
}

.itemTop{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.itemName{
    font-size:15px;
    font-weight:600;
}

.itemSub{
    font-size:12px;
    color:gray;
    margin-top:4px;
}

.itemPrice{
    font-size:18px;
    font-weight:600;
}

.itemButtons{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.editBtn{
    background:#ffc107;
    color:black;
}

.deleteBtn{
    background:#dc3545;
}

.itemButtons button{
    flex:1;
    padding:8px;
    font-size:13px;
}

.darkMode{
    background:#111;
    color:white;
}

.darkMode .container{
    background:#1e1e1e;
}

.darkMode input,
.darkMode select{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode #suggestionsBox{
    background:#333;
    border:1px solid #555;
}

.darkMode .suggestionItem{
    border-bottom:1px solid #555;
}

.darkMode .suggestionItem:hover{
    background:#444;
}

.darkMode .totalBox{
    background:#333;
}

.darkMode .item{
    background:#2b2b2b;
    border:1px solid #444;
}

.darkMode .itemSub{
    color:#bbb;
}

.darkMode #dateTime{
    color:#bbb;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<div class="logo">
SriRagg's
</div>

<div id="dateTime"></div>

</div>

<div class="topButtons">

<button class="iconBtn whatsappBtn"
onclick="sendWhatsApp()">
📤
</button>

<button class="iconBtn darkBtn"
onclick="toggleDarkMode()">
🌙
</button>

<button class="iconBtn resetBtn"
onclick="resetBill()">
🗑
</button>

</div>

</div>

<input type="file"
id="productFile"
accept=".xlsx,.xls,.csv">

<input type="text"
id="customerName"
placeholder="Customer Name">

<input type="number"
id="customerPhone"
placeholder="WhatsApp Number">

<select id="categoryFilter">

<option value="">
All Categories
</option>

</select>

<input type="text"
id="itemName"
placeholder="Search Product">

<div id="suggestionsBox"></div>

<input type="number"
id="itemQty"
placeholder="Quantity">

<button onclick="addItem()">
Add Item
</button>

<div class="totalBox">

<div class="totalLine">
<span>Total Quantity</span>
<span id="totalItems">0</span>
</div>

<div class="totalLine">
<span>Unique Items</span>
<span id="uniqueItems">0</span>
</div>

<div class="totalLine">
<span>MRP Total</span>
<span>₹<span id="mrpTotal">0.00</span></span>
</div>

<div class="totalLine">
<span>Bill Total</span>
<span>₹<span id="billTotal">0.00</span></span>
</div>

<div class="dotted"></div>

<div class="grandTotal">
Grand Total ₹<span id="grandTotal">0.00</span>
</div>

<div class="savings">
Your Savings ₹<span id="savings">0.00</span>
</div>

</div>

<div id="itemList"></div>

</div>

<script>

let items = [];

let productCatalog = [];

let selectedProduct = null;

/* ELEMENTS */

const itemName =
document.getElementById("itemName");

const itemQty =
document.getElementById("itemQty");

const suggestionsBox =
document.getElementById("suggestionsBox");

const categoryFilter =
document.getElementById("categoryFilter");

const productFile =
document.getElementById("productFile");

/* FILE UPLOAD */

productFile.addEventListener("change",function(e){

    let file = e.target.files[0];

    if(!file){
        return;
    }

    let reader =
    new FileReader();

    reader.onload = function(event){

        let data =
        new Uint8Array(
            event.target.result
        );

        let workbook =
        XLSX.read(data,{
            type:"array"
        });

        let sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

        let json =
        XLSX.utils.sheet_to_json(
            sheet,
            {header:1}
        );

        parseExcel(json);

    };

    reader.readAsArrayBuffer(file);

});

/* PARSE EXCEL */

function parseExcel(data){

    productCatalog = [];

    for(let i=1;i<data.length;i++){

        let row = data[i];

        if(!row || row.length===0){
            continue;
        }

        productCatalog.push({

            category:
            String(row[0] || "").trim(),

            code:
            String(row[1] || "").trim(),

            brand:
            String(row[2] || "").trim(),

            internalName:
            String(row[3] || "").trim(),

            displayName:
            String(row[4] || "").trim(),

            unit:
            String(row[5] || "").trim(),

            mrp:
            Number(row[7]) || 0,

            salePrice:
            Number(row[8]) || 0

        });

    }

    loadCategories();

    alert("Excel Loaded Successfully");

}

/* LOAD CATEGORY */

function loadCategories(){

    categoryFilter.innerHTML =
    '<option value="">All Categories</option>';

    let categories =

    [...new Set(
        productCatalog.map(
            p=>p.category
        )
    )];

    categories.forEach(category=>{

        let option =
        document.createElement("option");

        option.value = category;

        option.innerText = category;

        categoryFilter.appendChild(option);

    });

}

/* SEARCH */

itemName.addEventListener("input",function(){

    let search =
    itemName.value.toLowerCase();

    let selectedCategory =
    categoryFilter.value;

    suggestionsBox.innerHTML="";

    if(search===""){
        return;
    }

    let filtered =
    productCatalog.filter(product=>{

        let matchesSearch =

        product.displayName
        .toLowerCase()
        .includes(search)

        ||

        product.code
        .toLowerCase()
        .includes(search);

        let matchesCategory =

        selectedCategory === ""

        ||

        product.category ===
        selectedCategory;

        return matchesSearch &&
        matchesCategory;

    });

    filtered.slice(0,20)
    .forEach(product=>{

        let div =
        document.createElement("div");

        div.className =
        "suggestionItem";

        div.innerHTML =

        `<strong>${product.displayName}</strong>

        <br>

        ${product.brand}
        | ${product.unit}

        <br>

        MRP ₹${product.mrp}
        | Sale ₹${product.salePrice}`;

        div.onclick = function(){

            selectedProduct =
            product;

            itemName.value =
            product.displayName;

            suggestionsBox.innerHTML="";

            itemQty.focus();

        };

        suggestionsBox.appendChild(div);

    });

});

/* KEYBOARD FLOW */

itemName.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        itemQty.focus();

    }

});

itemQty.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        addItem();

    }

});

/* ADD ITEM */

function addItem(){

    if(!selectedProduct){

        alert("Select Product");

        return;

    }

    let qty =
    parseFloat(itemQty.value);

    if(isNaN(qty) || qty<=0){

        alert("Enter Quantity");

        return;

    }

    let existingItem =
    items.find(item=>

        item.code ===
        selectedProduct.code

    );

    if(existingItem){

        existingItem.qty += qty;

        existingItem.total =

        existingItem.qty *

        existingItem.salePrice;

    }

    else{

        items.push({

            code:
            selectedProduct.code,

            brand:
            selectedProduct.brand,

            displayName:
            selectedProduct.displayName,

            unit:
            selectedProduct.unit,

            mrp:
            selectedProduct.mrp,

            salePrice:
            selectedProduct.salePrice,

            qty:qty,

            total:
            qty *
            selectedProduct.salePrice

        });

    }

    displayItems();

    updateTotals();

    itemName.value = "";

    itemQty.value = "";

    suggestionsBox.innerHTML = "";

    selectedProduct = null;

    itemName.focus();

}

/* DISPLAY ITEMS */

function displayItems(){

    let itemList =
    document.getElementById("itemList");

    itemList.innerHTML="";

    items.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className="item";

        div.innerHTML = `

        <div class="itemTop">

        <div>

        <div class="itemName">

        ${index+1}.
        ${item.displayName}

        </div>

        <div class="itemSub">

        ${item.brand}
        | ${item.unit}

        <br>

        Qty: ${item.qty}

        <br>

        MRP: ₹${item.mrp}

        <br>

        Selling: ₹${item.salePrice}

        </div>

        </div>

        <div class="itemPrice">

        ₹${item.total.toFixed(2)}

        </div>

        </div>

        <div class="itemButtons">

        <button class="editBtn"
        onclick="editItem(${index})">

        Edit

        </button>

        <button class="deleteBtn"
        onclick="removeItem(${index})">

        Delete

        </button>

        </div>

        `;

        itemList.appendChild(div);

    });

}

/* EDIT */

function editItem(index){

    let item = items[index];

    itemName.value =
    item.displayName;

    itemQty.value =
    item.qty;

    selectedProduct =
    productCatalog.find(product=>

        product.code ===
        item.code

    );

    items.splice(index,1);

    displayItems();

    updateTotals();

}

/* DELETE */

function removeItem(index){

    items.splice(index,1);

    displayItems();

    updateTotals();

}

/* TOTALS */

function updateTotals(){

    let grandTotal = 0;

    let mrpTotal = 0;

    let totalQty = 0;

    items.forEach(item=>{

        grandTotal += item.total;

        mrpTotal +=
        item.mrp * item.qty;

        totalQty += item.qty;

    });

    let savings =
    mrpTotal - grandTotal;

    document.getElementById("grandTotal")
    .innerText =
    grandTotal.toFixed(2);

    document.getElementById("billTotal")
    .innerText =
    grandTotal.toFixed(2);

    document.getElementById("mrpTotal")
    .innerText =
    mrpTotal.toFixed(2);

    document.getElementById("savings")
    .innerText =
    savings.toFixed(2);

    document.getElementById("totalItems")
    .innerText =
    totalQty;

    document.getElementById("uniqueItems")
    .innerText =
    items.length;

}

/* RESET */

function resetBill(){

    items = [];

    displayItems();

    updateTotals();

}

/* WHATSAPP */

function sendWhatsApp(){

    let phone =
    document.getElementById("customerPhone").value;

    let grandTotal = 0;

    let message =
`Sri Raghavendra Grocery

`;

    items.forEach((item,index)=>{

        grandTotal += item.total;

        message +=

`${index+1}. ${item.displayName}

Qty: ${item.qty}

Price: ₹${item.salePrice}

Total: ₹${item.total.toFixed(2)}

`;

    });

    message +=

`----------------------

Grand Total Rs.
${grandTotal.toFixed(2)}

Thank You`;

    let url =

`https://wa.me/91${phone}?text=${encodeURIComponent(message)}`;

    window.open(url,"_blank");

}

/* DARK MODE */

function toggleDarkMode(){

    document.body
    .classList
    .toggle("darkMode");

}

/* DATE */

function updateDateTime(){

    let now = new Date();

    let options = {

        weekday:"short",

        day:"2-digit",

        month:"short",

        hour:"numeric",

        minute:"2-digit"

    };

    document.getElementById("dateTime")
    .innerText =

    now.toLocaleString(
        "en-IN",
        options
    );

}

updateDateTime();

setInterval(updateDateTime,60000);

</script>

</body>
</html>
