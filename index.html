<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SriRagg's Billing App</title>

<!-- FONT -->

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<!-- XLSX -->

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    padding:15px;
    transition:0.3s;
}

.container{
    max-width:430px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:18px;
    box-shadow:0 0 12px rgba(0,0,0,0.08);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.logo{
    font-size:24px;
    font-weight:600;
}

#dateTime{
    font-size:12px;
    color:gray;
}

.topButtons{
    display:flex;
    gap:8px;
}

.iconBtn{
    border:none;
    color:white;
    width:42px;
    height:42px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

.whatsappBtn{
    background:#25D366;
}

.darkBtn{
    background:#222;
}

.resetBtn{
    background:#dc3545;
}

input,
select,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.92;
}

#suggestionsBox{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    max-height:220px;
    overflow-y:auto;
    margin-top:5px;
}

.suggestionItem{
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.suggestionItem:hover{
    background:#f0f0f0;
}

.totalBox{
    margin-top:15px;
    padding:15px;
    border-radius:14px;
    background:#f4f4f4;
}

.totalLine{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:15px;
}

.grandTotal{
    font-size:26px;
    font-weight:700;
    text-align:right;
    margin-top:15px;
}

.savings{
    text-align:right;
    color:green;
    font-weight:600;
    margin-top:8px;
}

.dotted{
    border-bottom:2px dashed #000;
    margin-top:12px;
    margin-bottom:12px;
}

#itemList{
    margin-top:18px;
}

.item{
    background:#fafafa;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    border:1px solid #eee;
}

.itemTop{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.itemName{
    font-weight:600;
    font-size:15px;
}

.itemSub{
    font-size:12px;
    color:gray;
    margin-top:4px;
}

.itemPrice{
    font-weight:600;
    font-size:18px;
}

.itemButtons{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.editBtn{
    background:#ffc107;
    color:black;
}

.deleteBtn{
    background:#dc3545;
}

.itemButtons button{
    flex:1;
    padding:8px;
    font-size:13px;
}

.darkMode{
    background:#111;
    color:white;
}

.darkMode .container{
    background:#1e1e1e;
}

.darkMode input,
.darkMode select{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode #suggestionsBox{
    background:#333;
    border:1px solid #555;
}

.darkMode .suggestionItem{
    border-bottom:1px solid #555;
}

.darkMode .suggestionItem:hover{
    background:#444;
}

.darkMode .totalBox{
    background:#333;
}

.darkMode .item{
    background:#2b2b2b;
    border:1px solid #444;
}

.darkMode .itemSub{
    color:#bbb;
}

.darkMode #dateTime{
    color:#bbb;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<div class="logo">
SriRagg's
</div>

<div id="dateTime"></div>

</div>

<div class="topButtons">

<button class="iconBtn whatsappBtn"
onclick="sendWhatsApp()">
📤
</button>

<button class="iconBtn darkBtn"
onclick="toggleDarkMode()">
🌙
</button>

<button class="iconBtn resetBtn"
onclick="resetBill()">
🗑
</button>

</div>

</div>

<!-- FILE -->

<input type="file"
id="productFile"
accept=".csv,.xlsx,.xls">

<!-- CUSTOMER -->

<input type="text"
id="customerName"
placeholder="Customer Name">

<input type="number"
id="customerPhone"
placeholder="WhatsApp Number">

<!-- CATEGORY -->

<select id="categoryFilter">

<option value="">
All Categories
</option>

</select>

<!-- PRODUCT -->

<input type="text"
id="itemName"
placeholder="Search Product">

<div id="suggestionsBox"></div>

<input type="number"
id="itemQty"
placeholder="Quantity">

<button onclick="addItem()">
Add Item
</button>

<!-- TOTALS -->

<div class="totalBox">

<div class="totalLine">

<span>Total Quantity</span>

<span id="totalItems">0</span>

</div>

<div class="totalLine">

<span>Unique Items</span>

<span id="uniqueItems">0</span>

</div>

<div class="totalLine">

<span>MRP Total</span>

<span>
₹<span id="mrpTotal">0.00</span>
</span>

</div>

<div class="totalLine">

<span>Bill Total</span>

<span>
₹<span id="billTotal">0.00</span>
</span>

</div>

<div class="dotted"></div>

<div class="grandTotal">

Grand Total ₹<span id="grandTotal">0.00</span>

</div>

<div class="savings">

Your Savings ₹<span id="savings">0.00</span>

</div>

</div>

<!-- ITEMS -->

<div id="itemList"></div>

</div>

<script>

/* =========================
GLOBAL VARIABLES
========================= */

let items = [];

let productCatalog = [];

let selectedProduct = null;

let invoiceCounter =
localStorage.getItem("invoiceCounter") || 1;

/* =========================
ELEMENTS
========================= */

const itemName =
document.getElementById("itemName");

const itemQty =
document.getElementById("itemQty");

const suggestionsBox =
document.getElementById("suggestionsBox");

const productFile =
document.getElementById("productFile");

const categoryFilter =
document.getElementById("categoryFilter");

/* =========================
LOAD SAVED CATALOG
========================= */

let savedCatalog =
localStorage.getItem("productCatalog");

if(savedCatalog){

    productCatalog =
    JSON.parse(savedCatalog);

    loadCategories();

}

/* =========================
FILE UPLOAD
========================= */

productFile.addEventListener("change",function(e){

    let file = e.target.files[0];

    if(!file){
        return;
    }

    let fileName =
    file.name.toLowerCase();

    if(fileName.endsWith(".csv")){

        let reader =
        new FileReader();

        reader.onload = function(event){

            parseCSV(event.target.result);

        };

        reader.readAsText(file);

    }

    else{

        let reader =
        new FileReader();

        reader.onload = function(event){

            let data =
            new Uint8Array(
                event.target.result
            );

            let workbook =
            XLSX.read(data,{

                type:"array"

            });

            let sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

            let json =
            XLSX.utils.sheet_to_json(
                sheet,
                {header:1}
            );

            parseExcel(json);

        };

        reader.readAsArrayBuffer(file);

    }

});

/* =========================
PARSE CSV
========================= */

function parseCSV(csv){

    let lines =
    csv.split("\n");

    productCatalog = [];

    for(let i=1;i<lines.length;i++){

        let row =
        lines[i].split(",");

        if(row.length >= 10){

            productCatalog.push({

                category:row[0].trim(),

                code:row[1].trim(),

                brand:row[2].trim(),

                internalName:row[3].trim(),

                displayName:row[4].trim(),

                unit:row[5].trim(),

                mrp:parseFloat(row[6]),

                salePrice:parseFloat(row[7]),

                stockQty:parseFloat(row[8]) || 0,

                gst:parseFloat(row[9]) || 0

            });

        }

    }

    saveCatalog();

    loadCategories();

    alert("CSV Loaded");

}

/* =========================
PARSE EXCEL
========================= */

function parseExcel(data){

    productCatalog = [];

    for(let i=1;i<data.length;i++){

        let row = data[i];

        if(row.length >= 10){

            productCatalog.push({

                category:String(row[0]).trim(),

                code:String(row[1]).trim(),

                brand:String(row[2]).trim(),

                internalName:String(row[3]).trim(),

                displayName:String(row[4]).trim(),

                unit:String(row[5]).trim(),

                mrp:parseFloat(row[6]),

                salePrice:parseFloat(row[7]),

                stockQty:parseFloat(row[8]) || 0,

                gst:parseFloat(row[9]) || 0

            });

        }

    }

    saveCatalog();

    loadCategories();

    alert("Excel Loaded");

}

/* =========================
SAVE CATALOG
========================= */

function saveCatalog(){

    localStorage.setItem(

        "productCatalog",

        JSON.stringify(productCatalog)

    );

}

/* =========================
LOAD CATEGORIES
========================= */

function loadCategories(){

    categoryFilter.innerHTML =

    '<option value="">All Categories</option>';

    let categories =

    [...new Set(
        productCatalog.map(
            p=>p.category
        )
    )];

    categories.forEach(category=>{

        let option =
        document.createElement("option");

        option.value = category;

        option.innerText = category;

        categoryFilter.appendChild(option);

    });

}

/* =========================
AUTOCOMPLETE
========================= */

itemName.addEventListener("input",function(){

    let search =
    itemName.value.toLowerCase();

    let selectedCategory =
    categoryFilter.value;

    suggestionsBox.innerHTML="";

    if(search===""){
        return;
    }

    let filtered =
    productCatalog.filter(product=>{

        let matchesSearch =

        product.displayName
        .toLowerCase()
        .includes(search)

        ||

        product.code
        .toLowerCase()
        .includes(search)

        ||

        product.internalName
        .toLowerCase()
        .includes(search);

        let matchesCategory =

        selectedCategory === ""

        ||

        product.category ===
        selectedCategory;

        return matchesSearch &&
        matchesCategory;

    });

    filtered.slice(0,20)
    .forEach(product=>{

        let div =
        document.createElement("div");

        div.className =
        "suggestionItem";

        div.innerHTML =

        `<strong>${product.displayName}</strong>

        <br>

        ${product.brand}
        | ${product.unit}

        <br>

        MRP ₹${product.mrp}
        | Sale ₹${product.salePrice}`;

        div.onclick = function(){

            selectedProduct =
            product;

            itemName.value =
            product.displayName;

            suggestionsBox.innerHTML="";

            itemQty.focus();

        };

        suggestionsBox.appendChild(div);

    });

});

/* =========================
KEYBOARD
========================= */

itemName.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        itemQty.focus();

    }

});

itemQty.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        addItem();

    }

});

/* =========================
ADD ITEM
========================= */

function addItem(){

    if(!selectedProduct){

        alert("Select product");

        return;

    }

    let qty =
    parseFloat(itemQty.value);

    if(isNaN(qty) || qty<=0){

        alert("Enter quantity");

        return;

    }

    let existingItem =
    items.find(item=>

        item.code ===
        selectedProduct.code

    );

    if(existingItem){

        existingItem.qty += qty;

        existingItem.total =

        existingItem.qty *

        existingItem.salePrice;

    }

    else{

        items.push({

            category:
            selectedProduct.category,

            code:
            selectedProduct.code,

            brand:
            selectedProduct.brand,

            displayName:
            selectedProduct.displayName,

            unit:
            selectedProduct.unit,

            mrp:
            selectedProduct.mrp,

            salePrice:
            selectedProduct.salePrice,

            qty:qty,

            total:
            qty *
            selectedProduct.salePrice

        });

    }

    displayItems();

    updateTotals();

    saveBill();

    itemName.value="";
    itemQty.value="";

    selectedProduct = null;

    itemName.focus();

}

/* =========================
DISPLAY ITEMS
========================= */

function displayItems(){

    let itemList =
    document.getElementById("itemList");

    itemList.innerHTML="";

    items.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className="item";

        div.innerHTML = `

        <div class="itemTop">

            <div>

                <div class="itemName">

                ${index+1}.
                ${item.displayName}

                </div>

                <div class="itemSub">

                ${item.brand}
                | ${item.unit}

                <br>

                Qty:
                ${item.qty}

                <br>

                MRP:
                ₹${item.mrp}

                <br>

                Selling:
                ₹${item.salePrice}

                </div>

            </div>

            <div class="itemPrice">

            ₹${item.total.toFixed(2)}

            </div>

        </div>

        <div class="itemButtons">

        <button class="editBtn"
        onclick="editItem(${index})">

        Edit

        </button>

        <button class="deleteBtn"
        onclick="removeItem(${index})">

        Delete

        </button>

        </div>

        `;

        itemList.appendChild(div);

    });

}

/* =========================
EDIT ITEM
========================= */

function editItem(index){

    let item = items[index];

    itemName.value =
    item.displayName;

    itemQty.value =
    item.qty;

    selectedProduct =
    productCatalog.find(product=>

        product.code ===
        item.code

    );

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveBill();

}

/* =========================
REMOVE ITEM
========================= */

function removeItem(index){

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveBill();

}

/* =========================
TOTALS
========================= */

function updateTotals(){

    let grandTotal = 0;

    let mrpTotal = 0;

    let totalQty = 0;

    items.forEach(item=>{

        grandTotal += item.total;

        mrpTotal +=
        item.mrp * item.qty;

        totalQty += item.qty;

    });

    let savings =
    mrpTotal - grandTotal;

    document.getElementById("grandTotal")
    .innerText =
    grandTotal.toFixed(2);

    document.getElementById("billTotal")
    .innerText =
    grandTotal.toFixed(2);

    document.getElementById("mrpTotal")
    .innerText =
    mrpTotal.toFixed(2);

    document.getElementById("savings")
    .innerText =
    savings.toFixed(2);

    document.getElementById("totalItems")
    .innerText =
    totalQty;

    document.getElementById("uniqueItems")
    .innerText =
    items.length;

}

/* =========================
SAVE BILL
========================= */

function saveBill(){

    localStorage.setItem(

        "billingItems",

        JSON.stringify(items)

    );

}

/* =========================
WHATSAPP
========================= */

function sendWhatsApp(){

    if(items.length===0){

        alert("No items");

        return;

    }

    let customer =
    document.getElementById("customerName").value;

    let phone =
    document.getElementById("customerPhone").value;

    let grandTotal = 0;

    let mrpTotal = 0;

    let message =

`Sri Raghavendra Grocery

Invoice No:
SRG-${String(invoiceCounter).padStart(4,"0")}

Customer:
${customer}

`;

    items.forEach((item,index)=>{

        let total =
        item.qty *
        item.salePrice;

        grandTotal += total;

        mrpTotal +=
        item.qty *
        item.mrp;

        message +=

`${index+1}. ${item.displayName}

Qty:
${item.qty}

Price:
₹${item.salePrice}

Total:
₹${total.toFixed(2)}

`;

    });

    let savings =
    mrpTotal - grandTotal;

    message +=

`====================

Grand Total Rs.
${grandTotal.toFixed(2)}

............................

Your Savings Rs.
${savings.toFixed(2)}

Thank You
Visit Again`;

    let url =

    `https://wa.me/91${phone}?text=${encodeURIComponent(message)}`;

    window.open(url,"_blank");

    invoiceCounter++;

    localStorage.setItem(
        "invoiceCounter",
        invoiceCounter
    );

}

/* =========================
RESET BILL
========================= */

function resetBill(){

    items = [];

    displayItems();

    updateTotals();

    saveBill();

}

/* =========================
DARK MODE
========================= */

function toggleDarkMode(){

    document.body
    .classList
    .toggle("darkMode");

    if(

        document.body
        .classList
        .contains("darkMode")

    ){

        localStorage.setItem(
            "darkMode",
            "enabled"
        );

    }

    else{

        localStorage.setItem(
            "darkMode",
            "disabled"
        );

    }

}

/* =========================
DATE TIME
========================= */

function updateDateTime(){

    let now = new Date();

    let options = {

        weekday:"short",

        day:"2-digit",

        month:"short",

        hour:"numeric",

        minute:"2-digit"

    };

    document.getElementById("dateTime")
    .innerText =

    now.toLocaleString(
        "en-IN",
        options
    );

}

setInterval(updateDateTime,60000);

/* =========================
LOAD APP
========================= */

window.onload = function(){

    let savedItems =
    localStorage.getItem("billingItems");

    if(savedItems){

        items =
        JSON.parse(savedItems);

        displayItems();

        updateTotals();

    }

    let darkMode =
    localStorage.getItem("darkMode");

    if(darkMode==="enabled"){

        document.body
        .classList
        .add("darkMode");

    }

    updateDateTime();

}

</script>

</body>
</html>
