<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Billing App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    padding:20px;
    transition:0.3s;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.headerTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.titleRow{
    display:flex;
    align-items:center;
    gap:10px;
}

.headerTop h2{
    margin:0;
    font-size:22px;
}

#dateTime{
    margin:0;
    font-size:13px;
    color:gray;
    white-space:nowrap;
}

.menuButtons{
    display:flex;
    gap:8px;
}

.whatsappBtn,
.resetBtn,
.darkBtn{
    width:auto;
    padding:8px 12px;
    margin-top:0;
    font-size:18px;
}

.darkBtn{
    background:#222;
}

.darkBtn:hover{
    background:#000;
}

.whatsappBtn{
    background:#25D366;
}

.whatsappBtn:hover{
    background:#1da851;
}

.resetBtn{
    background:#dc3545;
}

.resetBtn:hover{
    background:#b02a37;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.totalBox{
    margin-top:15px;
    margin-bottom:15px;
    padding:12px 15px;
    background:#f0f0f0;
    border-radius:10px;
}

.totalBox h3{
    margin:4px 0;
    font-size:16px;
}

#itemList{
    max-height:300px;
    overflow-y:auto;
    margin-top:10px;
    padding-right:5px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:10px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.itemButtons{
    display:flex;
    flex-direction:column;
    gap:5px;
    margin-top:5px;
}

.editBtn{
    background:#ffc107;
    color:black;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
}

.deleteBtn{
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
}

.darkMode{
    background:#111;
    color:white;
}

.darkMode .container{
    background:#1e1e1e;
}

.darkMode input{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode .totalBox{
    background:#333;
}

.darkMode #dateTime{
    color:#ccc;
}

</style>
</head>

<body>

<div class="container">

    <div class="headerTop">

        <div class="titleRow">

            <h2>SriRagg's</h2>

            <div class="menuButtons">

                <button class="whatsappBtn"
                onclick="sendWhatsApp()">
                    📤
                </button>

                <button class="resetBtn"
                onclick="resetBill()">
                    🗑
                </button>

                <button class="darkBtn"
                onclick="toggleDarkMode()">
                    🌙
                </button>

            </div>

        </div>

        <p id="dateTime"></p>

    </div>

    <!-- CUSTOMER DETAILS -->

    <input type="text"
    id="customerName"
    placeholder="Customer Name">

    <input type="number"
    id="customerPhone"
    placeholder="WhatsApp Number">

    <!-- ITEM INPUTS -->

    <input type="text"
    id="itemName"
    placeholder="Item Name (Optional)">

    <input type="text"
    id="itemQty"
    inputmode="numeric"
    placeholder="Quantity">

    <input type="number"
    id="itemPrice"
    placeholder="Price Per Item">

    <button onclick="addItem()">
        Add Item
    </button>

    <!-- TOTAL BOX -->

    <div class="totalBox">

        <h3>
            Total Quantity:
            <span id="totalItems">0</span>
            |
            Unique:
            <span id="uniqueItems">0</span>
        </h3>

        <h3>
            Total Cost:
            ₹<span id="totalCost">0.00</span>
        </h3>

    </div>

    <!-- ITEM LIST -->

    <div id="itemList"></div>

</div>

<script>

let items = [];

let invoiceCounter =
localStorage.getItem("invoiceCounter") || 1;

const itemName =
document.getElementById("itemName");

const itemQty =
document.getElementById("itemQty");

const itemPrice =
document.getElementById("itemPrice");

itemName.addEventListener("keydown",function(e){

    if(e.key==="Enter"){
        e.preventDefault();
        itemQty.focus();
    }

});

itemQty.addEventListener("keydown",function(e){

    if(e.key==="Enter"){
        e.preventDefault();
        itemPrice.focus();
    }

});

itemPrice.addEventListener("keydown",function(e){

    if(e.key==="Enter"){
        e.preventDefault();
        addItem();
    }

});

document.addEventListener("keydown",function(e){

    if(e.altKey && e.key==="Enter"){
        resetBill();
    }

    if(e.ctrlKey && e.key==="Enter"){
        sendWhatsApp();
    }

});

function addItem(){

    let name =
    itemName.value.trim();

    let qty =
    parseFloat(itemQty.value);

    let price =
    parseFloat(itemPrice.value);

    if(isNaN(qty) || isNaN(price)){

        alert("Please enter quantity and price");

        return;

    }

    if(name===""){
        name="Item";
    }

    let total =
    qty * price;

    let existingItem =
    items.find(item =>
        item.name.toLowerCase() === name.toLowerCase()
        &&
        item.price === price
    );

    if(existingItem){

        existingItem.qty += qty;

        existingItem.total =
        existingItem.qty * existingItem.price;

    }else{

        items.push({

            name:name,
            qty:qty,
            price:price,
            total:total

        });

    }

    displayItems();

    updateTotals();

    saveToLocalStorage();

    itemName.value="";
    itemQty.value="";
    itemPrice.value="";

    itemName.focus();

}

function displayItems(){

    let itemList =
    document.getElementById("itemList");

    itemList.innerHTML="";

    items.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className="item";

        div.innerHTML=`

        <div>

        <strong>${item.name}</strong><br>

        Qty: ${item.qty}
        × ₹${item.price}

        </div>

        <div style="text-align:right;">

        ₹${item.total.toFixed(2)}

        <div class="itemButtons">

        <button
        class="editBtn"
        onclick="editItem(${index})">

        Edit

        </button>

        <button
        class="deleteBtn"
        onclick="removeItem(${index})">

        Delete

        </button>

        </div>

        </div>

        `;

        itemList.appendChild(div);

    });

}

function editItem(index){

    let item = items[index];

    itemName.value = item.name;
    itemQty.value = item.qty;
    itemPrice.value = item.price;

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveToLocalStorage();

}

function removeItem(index){

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveToLocalStorage();

}

function updateTotals(){

    let totalCost = 0;

    let totalItems = 0;

    let uniqueItems = items.length;

    items.forEach((item)=>{

        totalCost += item.total;
        totalItems += item.qty;

    });

    document.getElementById("totalCost")
    .innerText = totalCost.toFixed(2);

    document.getElementById("totalItems")
    .innerText = totalItems;

    document.getElementById("uniqueItems")
    .innerText = uniqueItems;

}

function saveToLocalStorage(){

    localStorage.setItem(
        "billingItems",
        JSON.stringify(items)
    );

}

function sendWhatsApp(){

    if(items.length===0){

        alert("No items added");

        return;

    }

    let customer =
    document.getElementById("customerName").value;

    let phone =
    document.getElementById("customerPhone").value;

    let totalCost = 0;

    let totalItems = 0;

    let now = new Date();

    let invoiceNumber =
    "SRG-" +
    String(invoiceCounter).padStart(4,"0");

    let billDate =
    now.toLocaleDateString("en-IN",{

        weekday:"long",
        day:"2-digit",
        month:"short",
        year:"numeric"

    });

    let billTime =
    now.toLocaleTimeString("en-IN",{

        hour:"numeric",
        minute:"2-digit"

    });

    let message =

    "Sri Raghavendra Grocery | Bilekahalli\n\n" +

    "Invoice No: " +
    invoiceNumber +

    "\n\nCustomer: " +
    customer +

    "\n\nDate: " +
    billDate +

    "\nTime: " +
    billTime +

    "\n\n";

    items.forEach((item)=>{

        message +=
        item.name +
        " | Qty: " +
        item.qty +
        " | ₹" +
        item.total.toFixed(2) +
        "\n";

        totalCost += item.total;
        totalItems += item.qty;

    });

    message += "\n------------------\n";

    message +=
    "Total Quantity: " +
    totalItems + "\n";

    message +=
    "Unique Items: " +
    items.length + "\n";

    message +=
    "Total Cost: ₹" +
    totalCost.toFixed(2) +

    "\n\nThank you for shopping with us" +

    "\nVisit Again";

    let url =

    "https://wa.me/91" +
    phone +
    "?text=" +
    encodeURIComponent(message);

    window.open(url,"_blank");

    invoiceCounter++;

    localStorage.setItem(
        "invoiceCounter",
        invoiceCounter
    );

}

function resetBill(){

    items = [];

    displayItems();

    updateTotals();

    saveToLocalStorage();

    itemName.value="";
    itemQty.value="";
    itemPrice.value="";

    itemName.focus();

}

function toggleDarkMode(){

    document.body.classList.toggle("darkMode");

    if(document.body.classList.contains("darkMode")){

        localStorage.setItem(
            "darkMode",
            "enabled"
        );

    }else{

        localStorage.setItem(
            "darkMode",
            "disabled"
        );

    }

}

function updateDateTime(){

    let now = new Date();

    let options = {

        weekday:"short",
        day:"2-digit",
        month:"short",
        hour:"numeric",
        minute:"2-digit"

    };

    document.getElementById("dateTime")
    .innerText =
    now.toLocaleString("en-IN",options);

}

setInterval(updateDateTime,60000);

window.onload = function(){

    let savedItems =
    localStorage.getItem("billingItems");

    if(savedItems){

        items = JSON.parse(savedItems);

        displayItems();

        updateTotals();

    }

    let darkMode =
    localStorage.getItem("darkMode");

    if(darkMode==="enabled"){

        document.body.classList.add("darkMode");

    }

    updateDateTime();

}

</script>

</body>
</html>
