<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SuperMarket POS Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
}

body.dark{
    background:#111;
    color:white;
}

.app{
    display:flex;
    gap:12px;
    height:100vh;
    padding:12px;
}

.panel{
    flex:1;
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 0 12px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
}

body.dark .panel{
    background:#1e1e1e;
}

.center{flex:1.2;}

#itemList{
    flex:1;
    overflow-y:auto;
    margin-top:10px;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

body.dark input{
    background:#2a2a2a;
    color:white;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

#suggestionsBox{
    max-height:200px;
    overflow-y:auto;
    border:1px solid #ddd;
    margin-top:5px;
}

.suggestionItem{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.selected{
    background:#007bff;
    color:white;
}

.item{
    background:#f7f7f7;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

body.dark .item{
    background:#2a2a2a;
}

.totalBox{
    background:#f7f7f7;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

body.dark .totalBox{
    background:#2a2a2a;
}

</style>

</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="panel">

<h3>Summary</h3>

<div class="totalBox">
<div>Total Qty: <span id="totalItems">0</span></div>
<div>MRP: ₹<span id="mrpTotal">0</span></div>
<div>Bill: ₹<span id="billTotal">0</span></div>
<div>Savings: ₹<span id="savings">0</span></div>
</div>

<button onclick="toggleDark()">🌙 Dark Mode</button>
<button onclick="resetBill()">🗑 Reset</button>
<button onclick="sendWhatsApp()">📤 WhatsApp</button>

</div>

<!-- CENTER -->
<div class="panel center">

<h3>Billing</h3>

<input type="file" id="file">

<input type="text" id="search" placeholder="Search product">
<div id="suggestionsBox"></div>

<input type="text" id="qty" placeholder="Qty (100g / 1kg / 2ltr / pcs)">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT -->
<div class="panel">

<h3>Items</h3>
<div id="itemList"></div>

</div>

</div>

<script>

/* DATA */
let products = [];
let items = [];
let selected = null;
let index = -1;

/* DARK MODE */
if(localStorage.getItem("dark")==="1"){
    document.body.classList.add("dark");
}

/* EXCEL */
document.getElementById("file").addEventListener("change", e=>{

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = ev=>{

        let data = new Uint8Array(ev.target.result);
        let wb = XLSX.read(data,{type:"array"});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet,{header:1});

        products = [];

        for(let i=1;i<json.length;i++){
            let r=json[i];
            if(!r) continue;

            products.push({
                code:r[1],
                name:r[4],
                unit:(r[5]||"").toLowerCase(),
                mrp:Number(r[7])||0,
                sale:Number(r[8])||0,
                stock:Number(r[9])||0
            });
        }

        alert("Loaded");
    };

    reader.readAsArrayBuffer(file);
});

/* SEARCH */
let box=document.getElementById("suggestionsBox");

document.getElementById("search").addEventListener("input", e=>{

    let v=e.target.value.toLowerCase();
    box.innerHTML="";
    index=-1;

    if(!v) return;

    let f=products.filter(p=>
        (p.name||"").toLowerCase().includes(v) ||
        (p.code||"").toLowerCase().includes(v)
    );

    f.slice(0,15).forEach(p=>{

        let d=document.createElement("div");
        d.className="suggestionItem";
        d.innerHTML=p.name;

        d.onclick=()=>select(p);

        box.appendChild(d);
    });
});

/* KEY NAV */
document.getElementById("search").addEventListener("keydown",e=>{

    let items=document.querySelectorAll(".suggestionItem");

    if(e.key==="ArrowDown"){
        index++;
        highlight(items);
    }

    if(e.key==="ArrowUp"){
        index--;
        highlight(items);
    }

    if(e.key==="Enter"){
        if(items[index]) items[index].click();
        else document.getElementById("qty").focus();
    }
});

function highlight(items){
    items.forEach(i=>i.classList.remove("selected"));
    if(items[index]){
        items[index].classList.add("selected");
        items[index].scrollIntoView({block:"nearest"});
    }
}

function select(p){
    selected=p;
    document.getElementById("search").value=p.name;
    box.innerHTML="";
    document.getElementById("qty").focus();
}

/* UNIT PARSER */
function parseQty(v){

    v=(v||"").toLowerCase().trim();
    let n=parseFloat(v);
    if(isNaN(n)) return 0;

    if(v.includes("kg")) return n*1000;
    if(v.includes("g")) return n;
    if(v.includes("ltr")) return n*1000;
    if(v.includes("ml")) return n;

    return n;
}

/* ADD */
function addItem(){

    if(!selected) return alert("Select product");

    let qty=parseQty(document.getElementById("qty").value);
    if(!qty) return alert("Invalid qty");

    let unit=selected.unit.includes("kg")||selected.unit.includes("g")?"g":
             selected.unit.includes("ltr")||selected.unit.includes("ml")?"ml":"pcs";

    let ex=items.find(i=>i.code===selected.code);

    if(ex){
        ex.qty+=qty;
        ex.total=ex.qty*ex.sale;
    }else{
        items.push({
            code:selected.code,
            name:selected.name,
            qty,
            sale:selected.sale,
            mrp:selected.mrp,
            total:qty*selected.sale,
            unit
        });
    }

    selected=null;
    document.getElementById("search").value="";
    document.getElementById("qty").value="";
    box.innerHTML="";

    render();
    totals();

    document.getElementById("search").focus();
}

/* RENDER */
function render(){

    let list=document.getElementById("itemList");
    list.innerHTML="";

    items.forEach((i,idx)=>{

        let div=document.createElement("div");
        div.className="item";

        div.innerHTML=`
        <b>${i.name}</b><br>
        Qty: ${i.qty}<br>
        ₹${i.total.toFixed(2)}<br>

        <button onclick="edit(${idx})">Edit</button>
        <button onclick="del(${idx})" style="background:red;">Delete</button>
        `;

        list.appendChild(div);
    });
}

/* EDIT */
function edit(i){
    let it=items[i];
    document.getElementById("search").value=it.name;
    document.getElementById("qty").value=it.qty;
    selected=products.find(p=>p.code===it.code);
    items.splice(i,1);
    render(); totals();
}

/* DELETE */
function del(i){
    items.splice(i,1);
    render(); totals();
}

/* TOTALS */
function totals(){

    let mrp=0,bill=0,qty=0;

    items.forEach(i=>{
        mrp+=i.mrp*i.qty;
        bill+=i.total;
        qty+=i.qty;
    });

    document.getElementById("mrpTotal").innerText=mrp.toFixed(2);
    document.getElementById("billTotal").innerText=bill.toFixed(2);
    document.getElementById("totalItems").innerText=qty;
    document.getElementById("savings").innerText=(mrp-bill).toFixed(2);
}

/* RESET */
function resetBill(){
    items=[];
    render(); totals();
}

/* DARK */
function toggleDark(){
    document.body.classList.toggle("dark");
    localStorage.setItem("dark",document.body.classList.contains("dark")?1:0);
}

/* WHATSAPP */
function sendWhatsApp(){

    let msg="Bill:\n";

    items.forEach(i=>{
        msg+=`${i.name} x ${i.qty} = ₹${i.total}\n`;
    });

    window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
