<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super POS Pro Fixed</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#f5f5f5;
}

body.dark{background:#111;color:white;}

.app{display:flex;gap:10px;padding:12px;height:100vh;}

.panel{
flex:1;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

body.dark .panel{background:#1e1e1e;}

.center{flex:1.3;}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

body.dark input{background:#2a2a2a;color:white;}

button{background:#007bff;color:white;border:none;cursor:pointer;}

#suggestionsBox{
border:1px solid #ddd;
max-height:200px;
overflow:auto;
}

.suggestionItem{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.selected{background:#007bff;color:white;}

.item{
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

body.dark .item{background:#2a2a2a;}

/* ROUND DASHBOARD */
.circleWrap{
display:flex;
justify-content:center;
align-items:center;
margin-top:15px;
}

.circle{
width:220px;
height:220px;
border-radius:50%;
background:conic-gradient(#007bff 0% 25%, #28a745 25% 50%, #ffc107 50% 75%, #dc3545 75% 100%);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-weight:600;
text-align:center;
}

.circle small{
font-size:12px;
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="panel">

<h3>SUMMARY</h3>

<div>
Qty: <span id="qtyT">0</span><br>
MRP: ₹<span id="mrpT">0</span><br>
Bill: ₹<span id="billT">0</span><br>
Savings: ₹<span id="savT">0</span>
</div>

<button onclick="toggleDark()">Dark</button>
<button onclick="resetBill()">Reset</button>
<button onclick="sendWhatsApp()">WhatsApp</button>

<div class="circleWrap">
<div class="circle" id="circle">
Loading...
</div>
</div>

<button onclick="download()">Download Excel</button>

</div>

<!-- CENTER -->
<div class="panel center">

<input type="file" id="file">

<input type="text" id="search" placeholder="Search">
<div id="suggestionsBox"></div>

<input type="text" id="qty" placeholder="Qty (100g / 1kg / 2ltr)">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT -->
<div class="panel">

<h3>ITEMS</h3>
<div id="list"></div>

</div>

</div>

<script>

let products=[];
let items=[];
let selected=null;
let index=-1;

/* DARK */
if(localStorage.getItem("dark")==="1")
document.body.classList.add("dark");

/* EXCEL */
file.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
let data=new Uint8Array(ev.target.result);
let wb=XLSX.read(data,{type:"array"});
let sh=wb.Sheets[wb.SheetNames[0]];
let j=XLSX.utils.sheet_to_json(sh,{header:1});

products=[];

for(let i=1;i<j.length;i++){
let x=j[i];
if(!x) continue;

products.push({
code:x[1],
name:x[4],
cat:x[0],
unit:x[5],
mrp:+x[7]||0,
sale:+x[8]||0
});
}

alert("Loaded");
}
r.readAsArrayBuffer(e.target.files[0]);
};

/* SEARCH */
search.oninput=e=>{
let v=e.target.value.toLowerCase();
suggestionsBox.innerHTML="";
index=-1;

if(!v) return;

products.filter(p=>
(p.name||"").toLowerCase().includes(v)||
(p.code||"").toLowerCase().includes(v)
).slice(0,15).forEach(p=>{
let d=document.createElement("div");
d.className="suggestionItem";
d.innerText=p.name;
d.onclick=()=>pick(p);
suggestionsBox.appendChild(d);
});
};

/* ARROW FIX */
search.onkeydown=e=>{
let s=document.querySelectorAll(".suggestionItem");

if(e.key==="ArrowDown"){index++;hl(s);}
if(e.key==="ArrowUp"){index--;hl(s);}

if(e.key==="Enter"){
e.preventDefault();
if(s[index]) s[index].click();
else qty.focus();
}
};

function hl(s){
s.forEach(i=>i.classList.remove("selected"));
if(s[index]){
s[index].classList.add("selected");
s[index].scrollIntoView({block:"nearest"});
}
}

/* PICK */
function pick(p){
selected=p;
search.value=p.name;
suggestionsBox.innerHTML="";
qty.focus();
}

/* QTY ENTER FIX (IMPORTANT) */
qty.onkeydown=e=>{
if(e.key==="Enter"){
e.preventDefault();
addItem();
}
};

/* QTY PARSE */
function parse(v){
v=(v||"").toLowerCase();
let n=parseFloat(v);
if(isNaN(n)) return 0;

if(v.includes("kg")) return n*1000;
if(v.includes("g")) return n;
if(v.includes("ltr")) return n*1000;
if(v.includes("ml")) return n;

return n;
}

/* ADD */
function addItem(){

if(!selected) return alert("Select product");

let q=parse(v=qty.value);
if(!q) return alert("Invalid qty");

let ex=items.find(i=>i.code===selected.code);

if(ex){
ex.qty+=q;
ex.total=ex.qty*ex.sale;
}else{
items.push({
code:selected.code,
name:selected.name,
cat:selected.cat,
qty:q,
mrp:selected.mrp,
sale:selected.sale,
total:q*selected.sale
});
}

selected=null;
search.value="";
qty.value="";
suggestionsBox.innerHTML="";

render();
calc();
dashboard();

search.focus();
}

/* RENDER */
function render(){
list.innerHTML="";

items.forEach(i=>{
let d=document.createElement("div");
d.className="item";
d.innerHTML=`
<b>${i.name}</b><br>
Qty:${i.qty}<br>
₹${i.total.toFixed(2)}
`;
list.appendChild(d);
});
}

/* TOTALS */
function calc(){

let m=0,b=0,q=0;

items.forEach(i=>{
m+=i.mrp*i.qty;
b+=i.total;
q+=i.qty;
});

qtyT.innerText=q;
mrpT.innerText=m.toFixed(2);
billT.innerText=b.toFixed(2);
savT.innerText=(m-b).toFixed(2);
}

/* ROUND DASHBOARD (FIXED) */
function dashboard(){

let map={};

items.forEach(i=>{
let c=i.cat||"Other";
map[c]=(map[c]||0)+i.total;
});

let html="";
for(let k in map){
html+=`${k}: ₹${map[k].toFixed(0)}\n`;
}

circle.innerText=html || "No Sales";
}

/* RESET */
function resetBill(){
items=[];
render();calc();dashboard();
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark")?1:0);
}

/* WHATSAPP */
function sendWhatsApp(){
let msg="Bill:\n";
items.forEach(i=>{
msg+=`${i.name} x ${i.qty} = ₹${i.total}\n`;
});
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

/* DOWNLOAD */
function download(){

let data=[["Name","Category","Qty","Total"]];

items.forEach(i=>{
data.push([i.name,i.cat,i.qty,i.total]);
});

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.aoa_to_sheet(data);
XLSX.utils.book_append_sheet(wb,ws,"Report");

XLSX.writeFile(wb,"sales.xlsx");
}

</script>

</body>
</html>
