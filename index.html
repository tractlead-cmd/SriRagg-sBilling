<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supermarket POS Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#f5f5f5;
}

body.dark{
background:#111;
color:white;
}

.app{
display:flex;
gap:10px;
padding:12px;
height:100vh;
}

.panel{
flex:1;
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

body.dark .panel{
background:#1e1e1e;
}

.center{flex:1.3;}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

body.dark input{
background:#2a2a2a;
color:white;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

#suggestionsBox{
border:1px solid #ddd;
max-height:200px;
overflow:auto;
}

.suggestionItem{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.selected{background:#007bff;color:white;}

.item{
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

body.dark .item{background:#2a2a2a;}

.circleWrap{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin-top:15px;
}

.circle{
width:220px;
height:220px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-weight:600;
text-align:center;
}

</style>

</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="panel">

<h3>SUMMARY</h3>

<div>
Qty: <span id="tQty">0</span><br>
MRP: ₹<span id="tMrp">0</span><br>
Bill: ₹<span id="tBill">0</span><br>
Savings: ₹<span id="tSave">0</span>
</div>

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="saveBill()">Save Bill</button>
<button onclick="resetBill()">Reset</button>
<button onclick="sendWhatsApp()">WhatsApp</button>

<div class="circleWrap">

<div class="circle" id="circle" style="background:#ddd;">
No Sales
</div>

<!-- 🔥 INVOICE SEARCH -->
<input type="text" id="invSearch" placeholder="Search Invoice No">
<button onclick="searchInvoice()">Search Invoice</button>

<div id="invoiceResult"></div>

</div>

<button onclick="downloadExcel()">Download Excel</button>

</div>

<!-- CENTER -->
<div class="panel center">

<input type="file" id="file">

<input type="text" id="search" placeholder="Search product">
<div id="suggestionsBox"></div>

<input type="text" id="qty" placeholder="Qty (100g / 1kg / 2ltr)">

<button onclick="addItem()">Add Item</button>

</div>

<!-- RIGHT -->
<div class="panel">

<h3>ITEMS</h3>
<div id="list"></div>

</div>

</div>

<script>

/* ===================== DATA ===================== */

let products = [];
let items = JSON.parse(localStorage.getItem("items")) || [];
let bills = JSON.parse(localStorage.getItem("bills")) || [];

let selected = null;
let index = -1;

let invoiceNo = bills.length ? bills[bills.length-1].invoiceNo + 1 : 1;

/* ===================== SAVE ===================== */

function saveAll(){
localStorage.setItem("items", JSON.stringify(items));
localStorage.setItem("bills", JSON.stringify(bills));
}

/* ===================== LOAD DARK ===================== */

if(localStorage.getItem("dark")==="1")
document.body.classList.add("dark");

/* ===================== EXCEL ===================== */

file.onchange = e => {
let reader = new FileReader();

reader.onload = ev => {
let data = new Uint8Array(ev.target.result);
let wb = XLSX.read(data,{type:"array"});
let sh = wb.Sheets[wb.SheetNames[0]];
let json = XLSX.utils.sheet_to_json(sh,{header:1});

products = [];

for(let i=1;i<json.length;i++){
let r = json[i];
if(!r) continue;

products.push({
code:r[1],
name:r[4],
cat:r[0],
mrp:+r[7]||0,
sale:+r[8]||0,
unit:r[5]
});
}

alert("Excel Loaded");
};

reader.readAsArrayBuffer(e.target.files[0]);
};

/* ===================== SEARCH ===================== */

search.oninput = e => {
let v = e.target.value.toLowerCase();
suggestionsBox.innerHTML = "";
index = -1;

if(!v) return;

products.filter(p =>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").toLowerCase().includes(v)
).slice(0,15).forEach(p=>{
let d = document.createElement("div");
d.className="suggestionItem";
d.innerText=p.name;
d.onclick=()=>select(p);
suggestionsBox.appendChild(d);
});
};

/* ===================== SELECT ===================== */

function select(p){
selected = p;
search.value = p.name;
suggestionsBox.innerHTML = "";
qty.focus();
}

/* ===================== ADD ITEM ===================== */

function addItem(){

if(!selected) return alert("Select product");

let q = parseFloat(qty.value);
if(!q) return alert("Invalid qty");

let ex = items.find(i=>i.code===selected.code);

if(ex){
ex.qty += q;
ex.total = ex.qty * selected.sale;
}else{
items.push({
code:selected.code,
name:selected.name,
cat:selected.cat,
qty:q,
mrp:selected.mrp,
sale:selected.sale,
total:q*selected.sale
});
}

selected = null;
search.value="";
qty.value="";
suggestionsBox.innerHTML="";

render();
totals();
dashboard();

saveAll();
}

/* ===================== RENDER ===================== */

function render(){

list.innerHTML="";

items.forEach((i,idx)=>{
list.innerHTML += `
<div class="item">
<b>${i.name}</b><br>
Qty: ${i.qty}<br>
₹${i.total.toFixed(2)}<br>

<button onclick="edit(${idx})" style="background:#ffc107;color:black;">Edit</button>
<button onclick="del(${idx})" style="background:red;">Delete</button>
</div>`;
});
}

/* ===================== EDIT ===================== */

function edit(i){
let it = items[i];

search.value = it.name;
qty.value = it.qty;

selected = products.find(p=>p.code===it.code);

items.splice(i,1);

render();totals();dashboard();saveAll();
}

/* ===================== DELETE ===================== */

function del(i){
items.splice(i,1);
render();totals();dashboard();saveAll();
}

/* ===================== TOTALS ===================== */

function totals(){

let m=0,b=0,q=0;

items.forEach(i=>{
m += i.mrp*i.qty;
b += i.total;
q += i.qty;
});

tQty.innerText = q;
tMrp.innerText = m.toFixed(2);
tBill.innerText = b.toFixed(2);
tSave.innerText = (m-b).toFixed(2);
}

/* ===================== DASHBOARD ===================== */

function dashboard(){

let map={};

items.forEach(i=>{
let c=i.cat||"Other";
map[c]=(map[c]||0)+i.total;
});

let total = Object.values(map).reduce((a,b)=>a+b,0);

if(total===0){
circle.style.background="#ddd";
circle.innerHTML="No Sales";
return;
}

let colors=["#007bff","#28a745","#ffc107","#dc3545","#6f42c1","#17a2b8"];

let start=0;
let grad=[];
let i=0;

for(let k in map){

let pct=(map[k]/total)*100;
let end=start+pct;

grad.push(`${colors[i%colors.length]} ${start}% ${end}%`);

start=end;
i++;
}

circle.style.background = `conic-gradient(${grad.join(",")})`;
circle.innerHTML = `<small>Total Sales</small><b>₹${total.toFixed(0)}</b>`;
}

/* ===================== SAVE BILL ===================== */

function saveBill(){

if(items.length===0){
alert("No items");
return;
}

let mrpTotal=0;
let grand=0;

items.forEach(i=>{
mrpTotal += i.mrp*i.qty;
grand += i.total;
});

bills.push({
invoiceNo,
date:new Date().toLocaleString(),
items:[...items],
mrpTotal,
grand,
savings:mrpTotal-grand
});

invoiceNo++;

items=[];
saveAll();

render();
totals();
dashboard();

alert("Bill Saved");
}

/* ===================== SEARCH INVOICE ===================== */

function searchInvoice(){

let no = parseInt(invSearch.value);

let bill = bills.find(b=>b.invoiceNo===no);

if(!bill){
invoiceResult.innerHTML="❌ Not Found";
return;
}

let html = `
<b>Invoice #${bill.invoiceNo}</b><br>
Date: ${bill.date}<br>
MRP: ₹${bill.mrpTotal.toFixed(2)}<br>
Bill: ₹${bill.grand.toFixed(2)}<br>
Savings: ₹${bill.savings.toFixed(2)}<br><br>

<b>Items:</b><br>
`;

bill.items.forEach(i=>{
html += `${i.name} - Qty:${i.qty} - ₹${i.total.toFixed(2)}<br>`;
});

invoiceResult.innerHTML = html;
}

/* ===================== RESET ===================== */

function resetBill(){
items=[];
saveAll();
render();totals();dashboard();
}

/* ===================== DARK MODE ===================== */

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",
document.body.classList.contains("dark")?1:0);
}

/* ===================== WHATSAPP ===================== */

function sendWhatsApp(){

if(items.length===0){
alert("No items in bill");
return;
}

let msg="🧾 *BILL RECEIPT*\n\n";

let grand=0;
let mrpTotal=0;

items.forEach((i,idx)=>{
mrpTotal += i.mrp*i.qty;
grand += i.total;

msg += `${idx+1}. ${i.name}
Qty:${i.qty}
MRP:₹${i.mrp} Sale:₹${i.sale}
Total:₹${i.total.toFixed(2)}
-------------------\n`;
});

msg += `
GRAND: ₹${grand.toFixed(2)}
SAVE: ₹${(mrpTotal-grand).toFixed(2)}
`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

/* ===================== EXCEL EXPORT ===================== */

function downloadExcel(){

let data=[["Name","Category","Qty","Total"]];

items.forEach(i=>{
data.push([i.name,i.cat,i.qty,i.total]);
});

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.aoa_to_sheet(data);

XLSX.utils.book_append_sheet(wb,ws,"Report");
XLSX.writeFile(wb,"sales.xlsx");
}

</script>

</body>
</html>
