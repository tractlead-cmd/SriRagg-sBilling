<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SriRagg's Billing App</title>

<!-- POPPINS FONT -->

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<!-- EXCEL SUPPORT -->

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    padding:20px;
    transition:0.3s;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.headerTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.titleRow{
    display:flex;
    align-items:center;
    gap:10px;
}

.headerTop h2{
    margin:0;
    font-size:22px;
}

#dateTime{
    font-size:13px;
    color:gray;
}

.menuButtons{
    display:flex;
    gap:8px;
}

.whatsappBtn,
.resetBtn,
.darkBtn{
    width:auto;
    padding:8px 12px;
    margin-top:0;
    font-size:18px;
}

.whatsappBtn{
    background:#25D366;
}

.resetBtn{
    background:#dc3545;
}

.darkBtn{
    background:#222;
}

input,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:15px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.totalBox{
    margin-top:15px;
    margin-bottom:15px;
    padding:12px;
    background:#f0f0f0;
    border-radius:10px;
}

.totalBox h3{
    margin:5px 0;
    font-size:15px;
}

#itemList{
    max-height:300px;
    overflow-y:auto;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.itemButtons{
    display:flex;
    flex-direction:column;
    gap:5px;
    margin-top:5px;
}

.editBtn{
    background:#ffc107;
    color:black;
    padding:5px 10px;
    font-size:12px;
}

.deleteBtn{
    background:#dc3545;
    color:white;
    padding:5px 10px;
    font-size:12px;
}

#suggestionsBox{
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    max-height:220px;
    overflow-y:auto;
}

.suggestionItem{
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.suggestionItem:hover{
    background:#f0f0f0;
}

.darkMode{
    background:#111;
    color:white;
}

.darkMode .container{
    background:#1e1e1e;
}

.darkMode input{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode .totalBox{
    background:#333;
}

.darkMode #suggestionsBox{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode .suggestionItem{
    border-bottom:1px solid #555;
}

.darkMode .suggestionItem:hover{
    background:#444;
}

.darkMode #dateTime{
    color:#ccc;
}

</style>

</head>

<body>

<div class="container">

    <div class="headerTop">

        <div class="titleRow">

            <h2>SriRagg's</h2>

            <div class="menuButtons">

                <button class="whatsappBtn"
                onclick="sendWhatsApp()">
                    📤
                </button>

                <button class="resetBtn"
                onclick="resetBill()">
                    🗑
                </button>

                <button class="darkBtn"
                onclick="toggleDarkMode()">
                    🌙
                </button>

            </div>

        </div>

        <p id="dateTime"></p>

    </div>

    <!-- CSV / EXCEL -->

    <input type="file"
    id="productFile"
    accept=".csv,.xlsx,.xls">

    <!-- CUSTOMER -->

    <input type="text"
    id="customerName"
    placeholder="Customer Name">

    <input type="number"
    id="customerPhone"
    placeholder="WhatsApp Number">

    <!-- PRODUCT -->

    <input type="text"
    id="itemName"
    placeholder="Search Product">

    <div id="suggestionsBox"></div>

    <input type="text"
    id="itemQty"
    inputmode="numeric"
    placeholder="Quantity">

    <button onclick="addItem()">
        Add Item
    </button>

    <!-- TOTALS -->

    <div class="totalBox">

        <h3>
            Total Quantity:
            <span id="totalItems">0</span>
        </h3>

        <h3>
            Unique Items:
            <span id="uniqueItems">0</span>
        </h3>

        <h3>
            Grand Total:
            ₹<span id="totalCost">0.00</span>
        </h3>

    </div>

    <!-- ITEMS -->

    <div id="itemList"></div>

</div>

<script>

/* =========================
GLOBAL VARIABLES
========================= */

let items = [];

let productCatalog = [];

let selectedProduct = null;

let invoiceCounter =
localStorage.getItem("invoiceCounter") || 1;

/* =========================
ELEMENTS
========================= */

const itemName =
document.getElementById("itemName");

const itemQty =
document.getElementById("itemQty");

const suggestionsBox =
document.getElementById("suggestionsBox");

const productFile =
document.getElementById("productFile");

/* =========================
LOAD SAVED CATALOG
========================= */

let savedCatalog =
localStorage.getItem("productCatalog");

if(savedCatalog){

    productCatalog =
    JSON.parse(savedCatalog);

}

/* =========================
FILE UPLOAD
========================= */

productFile.addEventListener("change",function(e){

    let file = e.target.files[0];

    if(!file){
        return;
    }

    let fileName =
    file.name.toLowerCase();

    /* CSV */

    if(fileName.endsWith(".csv")){

        let reader =
        new FileReader();

        reader.onload = function(event){

            parseCSV(
                event.target.result
            );

        };

        reader.readAsText(file);

    }

    /* EXCEL */

    else if(

        fileName.endsWith(".xlsx")

        ||

        fileName.endsWith(".xls")

    ){

        let reader =
        new FileReader();

        reader.onload = function(event){

            let data =
            new Uint8Array(
                event.target.result
            );

            let workbook =
            XLSX.read(data,{

                type:"array"

            });

            let firstSheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

            let jsonData =
            XLSX.utils.sheet_to_json(
                firstSheet,
                {header:1}
            );

            parseExcel(jsonData);

        };

        reader.readAsArrayBuffer(file);

    }

});

/* =========================
CSV PARSER
========================= */

function parseCSV(csv){

    let lines =
    csv.split("\n");

    productCatalog = [];

    for(let i=1;i<lines.length;i++){

        let row =
        lines[i].split(",");

        if(row.length >= 6){

            productCatalog.push({

                code:row[0].trim(),

                internalName:row[1].trim(),

                displayName:row[2].trim(),

                unit:row[3].trim(),

                mrp:parseFloat(row[4]),

                salePrice:parseFloat(row[5])

            });

        }

    }

    saveCatalog();

    alert(
    "CSV Loaded Successfully"
    );

}

/* =========================
EXCEL PARSER
========================= */

function parseExcel(data){

    productCatalog = [];

    for(let i=1;i<data.length;i++){

        let row = data[i];

        if(row.length >= 6){

            productCatalog.push({

                code:String(row[0]).trim(),

                internalName:String(row[1]).trim(),

                displayName:String(row[2]).trim(),

                unit:String(row[3]).trim(),

                mrp:parseFloat(row[4]),

                salePrice:parseFloat(row[5])

            });

        }

    }

    saveCatalog();

    alert(
    "Excel Loaded Successfully"
    );

}

/* =========================
SAVE CATALOG
========================= */

function saveCatalog(){

    localStorage.setItem(

        "productCatalog",

        JSON.stringify(productCatalog)

    );

}

/* =========================
AUTOCOMPLETE
========================= */

itemName.addEventListener("input",function(){

    let search =
    itemName.value.toLowerCase();

    suggestionsBox.innerHTML="";

    if(search===""){
        return;
    }

    let filtered =
    productCatalog.filter(product =>

        product.displayName
        .toLowerCase()
        .includes(search)

        ||

        product.code
        .toLowerCase()
        .includes(search)

        ||

        product.internalName
        .toLowerCase()
        .includes(search)

    );

    filtered.slice(0,20)
    .forEach(product => {

        let div =
        document.createElement("div");

        div.className =
        "suggestionItem";

        div.innerHTML =

        "<strong>" +

        product.displayName +

        "</strong><br>" +

        "MRP ₹" +

        product.mrp +

        " | Sale ₹" +

        product.salePrice;

        div.onclick = function(){

            selectedProduct =
            product;

            itemName.value =
            product.displayName;

            suggestionsBox.innerHTML="";

            itemQty.focus();

        };

        suggestionsBox
        .appendChild(div);

    });

});

/* =========================
KEYBOARD SHORTCUTS
========================= */

itemName.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        itemQty.focus();

    }

});

itemQty.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        addItem();

    }

});

/* =========================
ADD ITEM
========================= */

function addItem(){

    if(!selectedProduct){

        alert(
        "Please select product from list"
        );

        return;

    }

    let qty =
    parseFloat(itemQty.value);

    if(isNaN(qty)){

        alert("Enter quantity");

        return;

    }

    let total =
    qty *
    selectedProduct.salePrice;

    let existingItem =
    items.find(item =>

        item.code ===
        selectedProduct.code

    );

    if(existingItem){

        existingItem.qty += qty;

        existingItem.total =

        existingItem.qty *

        existingItem.salePrice;

    }

    else{

        items.push({

            code:selectedProduct.code,

            displayName:
            selectedProduct.displayName,

            mrp:
            selectedProduct.mrp,

            salePrice:
            selectedProduct.salePrice,

            qty:qty,

            total:total

        });

    }

    displayItems();

    updateTotals();

    saveBill();

    itemName.value="";
    itemQty.value="";

    selectedProduct = null;

    itemName.focus();

}

/* =========================
DISPLAY ITEMS
========================= */

function displayItems(){

    let itemList =
    document.getElementById("itemList");

    itemList.innerHTML="";

    items.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className="item";

        div.innerHTML = `

        <div>

        <strong>
        ${index+1}. ${item.displayName}
        </strong>

        <br>

        MRP: ₹${item.mrp}

        <br>

        Qty: ${item.qty}

        <br>

        Selling Price:
        ₹${item.salePrice}

        </div>

        <div style="text-align:right;">

        ₹${item.total.toFixed(2)}

        <div class="itemButtons">

        <button class="editBtn"
        onclick="editItem(${index})">

        Edit

        </button>

        <button class="deleteBtn"
        onclick="removeItem(${index})">

        Delete

        </button>

        </div>

        </div>

        `;

        itemList.appendChild(div);

    });

}

/* =========================
EDIT ITEM
========================= */

function editItem(index){

    let item = items[index];

    itemName.value =
    item.displayName;

    itemQty.value =
    item.qty;

    selectedProduct =
    productCatalog.find(product =>

        product.code === item.code

    );

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveBill();

}

/* =========================
REMOVE ITEM
========================= */

function removeItem(index){

    items.splice(index,1);

    displayItems();

    updateTotals();

    saveBill();

}

/* =========================
TOTALS
========================= */

function updateTotals(){

    let grandTotal = 0;

    let totalQty = 0;

    items.forEach(item => {

        grandTotal += item.total;

        totalQty += item.qty;

    });

    document.getElementById("totalCost")
    .innerText =
    grandTotal.toFixed(2);

    document.getElementById("totalItems")
    .innerText =
    totalQty;

    document.getElementById("uniqueItems")
    .innerText =
    items.length;

}

/* =========================
SAVE BILL
========================= */

function saveBill(){

    localStorage.setItem(

        "billingItems",

        JSON.stringify(items)

    );

}

/* =========================
WHATSAPP
========================= */

function sendWhatsApp(){

    if(items.length===0){

        alert("No items added");

        return;

    }

    let customer =
    document.getElementById("customerName").value;

    let phone =
    document.getElementById("customerPhone").value;

    let grandTotal = 0;

    let totalSavings = 0;

    let message =

    "Sri Raghavendra Grocery\n\n";

    message +=

    "Invoice No: SRG-" +

    String(invoiceCounter)
    .padStart(4,"0");

    message +=
    "\n\nCustomer: " +
    customer;

    message +=
    "\n\n";

    items.forEach((item,index)=>{

        let savings =

        (item.mrp -

        item.salePrice)

        *

        item.qty;

        totalSavings += savings;

        grandTotal += item.total;

        message +=

        (index+1) +

        ". " +

        item.displayName +

        "\n";

        message +=
        "MRP: ₹" +
        item.mrp +
        "\n";

        message +=
        "Qty: " +
        item.qty +
        "\n";

        message +=
        "Selling Price: ₹" +
        item.salePrice +
        "\n";

        message +=
        "Total: ₹" +
        item.total.toFixed(2) +
        "\n\n";

    });

    message +=
    "--------------------------------\n\n";

    message +=
    "Grand Total: ₹" +
    grandTotal.toFixed(2);

    message +=
    "\n\n..............................\n\n";

    message +=
    "Your Savings: ₹" +
    totalSavings.toFixed(2);

    message +=
    "\n\nThank You\nVisit Us Again";

    let url =

    "https://wa.me/91" +

    phone +

    "?text=" +

    encodeURIComponent(message);

    window.open(url,"_blank");

    invoiceCounter++;

    localStorage.setItem(
        "invoiceCounter",
        invoiceCounter
    );

}

/* =========================
RESET BILL
========================= */

function resetBill(){

    items = [];

    displayItems();

    updateTotals();

    saveBill();

    itemName.value="";
    itemQty.value="";

    selectedProduct = null;

}

/* =========================
DARK MODE
========================= */

function toggleDarkMode(){

    document.body
    .classList
    .toggle("darkMode");

    if(
        document.body
        .classList
        .contains("darkMode")
    ){

        localStorage.setItem(
            "darkMode",
            "enabled"
        );

    }

    else{

        localStorage.setItem(
            "darkMode",
            "disabled"
        );

    }

}

/* =========================
DATE TIME
========================= */

function updateDateTime(){

    let now = new Date();

    let options = {

        weekday:"short",

        day:"2-digit",

        month:"short",

        hour:"numeric",

        minute:"2-digit"

    };

    document.getElementById("dateTime")
    .innerText =

    now.toLocaleString(
        "en-IN",
        options
    );

}

setInterval(updateDateTime,60000);

/* =========================
LOAD APP
========================= */

window.onload = function(){

    let savedItems =
    localStorage.getItem("billingItems");

    if(savedItems){

        items =
        JSON.parse(savedItems);

        displayItems();

        updateTotals();

    }

    let darkMode =
    localStorage.getItem("darkMode");

    if(darkMode==="enabled"){

        document.body
        .classList
        .add("darkMode");

    }

    updateDateTime();

}

</script>

</body>

</html>
